<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚡ Alarich Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
width:100%;
height:100%;
}

body{
min-height:100vh;
overflow:hidden;
background:
linear-gradient(
135deg,
#020617,
#0f172a,
#1e293b
);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
position:relative;
transition:.5s ease;
}

/* Background Glow */

body::before{
content:"";
position:absolute;
width:800px;
height:800px;
border-radius:50%;
background:
radial-gradient(circle,#2563eb40,transparent 70%);
animation:spin 20s linear infinite;
}

body::after{
content:"";
position:absolute;
width:600px;
height:600px;
border-radius:50%;
background:
radial-gradient(circle,#7c3aed40,transparent 70%);
animation:spinReverse 25s linear infinite;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

@keyframes spinReverse{
from{
transform:rotate(360deg);
}
to{
transform:rotate(0deg);
}
}

.container{
width:100%;
max-width:1200px;
position:relative;
z-index:10;
text-align:center;
}

/* Logo */

.logo{
font-size:clamp(2.2rem,6vw,4.5rem);
font-weight:700;
color:white;
margin-bottom:10px;
text-shadow:0 0 25px #3b82f6;
}

.subtitle{
font-size:clamp(.9rem,2vw,1.2rem);
color:#94a3b8;
margin-bottom:50px;
}

/* Grid */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

/* Card */

.card{
background:
rgba(255,255,255,0.05);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,.08);

border-radius:25px;

padding:35px 25px;

cursor:pointer;

position:relative;

overflow:hidden;

transition:.4s ease;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

min-height:280px;
}

.card:hover{
transform:
translateY(-10px)
scale(1.02);

border-color:#60a5fa;

box-shadow:
0 0 40px rgba(37,99,235,.35);
}

.card::before{
content:"";
position:absolute;
top:-150%;
left:-150%;
width:300%;
height:300%;

background:
linear-gradient(
45deg,
transparent,
rgba(255,255,255,.08),
transparent
);

transform:rotate(25deg);

transition:1s;
}

.card:hover::before{
top:100%;
left:100%;
}

.icon{
font-size:75px;
margin-bottom:15px;
}

.title{
font-size:28px;
font-weight:700;
color:white;
margin-bottom:10px;
}

.desc{
color:#cbd5e1;
line-height:1.7;
font-size:15px;
max-width:260px;
}

/* Footer */

.footer{
margin-top:40px;
font-size:14px;
color:#64748b;
}

/* Mobile */

@media(max-width:768px){

.cards{
grid-template-columns:1fr;
}

.card{
min-height:240px;
}

.icon{
font-size:60px;
}

.title{
font-size:24px;
}

.subtitle{
margin-bottom:30px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="logo">
⚡ Alarich Hub
</div>

<div class="subtitle">
Pilih aplikasi yang ingin dibuka
</div>

<div class="cards">

<!-- ALARICH -->

<div class="card"
onclick="openPage('alarich-ai.html')">

<div class="icon">🤖</div>

<div class="title">
Alarich AI
</div>

<div class="desc">
AI Akademik, Deep Talk,
Latihan Soal dan Islamic Assistant.
</div>

</div>

<!-- GAMEE PART 1 -->

<div class="card"
onclick="openPage('gamee.html')">

<div class="icon">🎮</div>

<div class="title">
Gamee Part 1
</div>

<div class="desc">
Kumpulan game, hiburan,
dan tantangan bagian pertama.
</div>

</div>

<!-- GAMEE PART 2 -->

<div class="card"
onclick="openPage('game.html')">

<div class="icon">🏆</div>

<div class="title">
Gamee Part 2
</div>

<div class="desc">
Mode lanjutan,
fitur spesial,
dan game tambahan.
</div>

</div>

</div>

<div class="footer">
© 2026 Alarich Project
</div>

</div>

<script>

document.body.style.opacity="0";

window.addEventListener("load",()=>{

document.body.style.opacity="1";

const cards=document.querySelectorAll(".card");

cards.forEach((card,index)=>{

card.style.opacity="0";
card.style.transform="translateY(50px)";

setTimeout(()=>{

card.style.transition=".7s";

card.style.opacity="1";
card.style.transform="translateY(0px)";

},300+(index*200));

});

});

function openPage(page){

document.body.style.opacity="0";
document.body.style.transform="scale(.98)";

setTimeout(()=>{

window.location.href=page;

},500);

}

</script>

</body>
</html>
