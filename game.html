// BATTLE
// ============================================================
let cdTimers={};

function startBattle(){
  G.phase='battle';G.battleBlocked=false;cdTimers={};
  G.statusEffects={stunned:0,frozen:0,dodging:false,barrier:false,buffAtk:0,buffAtkTurns:0,buffDef:0,buffDefTurns:0,regen:0,regenTurns:0,poisoned:0,poisonTurns:0,burned:0,burnTurns:0,critBuff:0,critBuffTurns:0,blinded:0,cursed:0,curseVal:0};
  G.bossCharge=0;G.bossRage=false;G.bossRageTurns=0;
  G.kills5++;

  let enemy;
  const map=ZONES[G.player.currentZone].maps[G.player.currentMap];

  if(G.miniBossReady){
    const bossData=BOSSES[map.bossId];
    if(bossData){
      enemy={...bossData,hp:bossData.hp,maxHp:bossData.hp};
      G.miniBossReady=false;G.kills5=0;
      sfx('boss_appear');startBGM('boss');
      showBossWarning(bossData.intro||`⚠️ BOSS: ${bossData.name}!`);
    }
  }

  if(!enemy){
    const name=map.enemies[Math.floor(Math.random()*map.enemies.length)];
    const base=ENEMIES[name];if(!base){G.phase='idle';renderScene();return;}
    const diffMult=map.diffMult*(1+(G.player.level-1)*.04);
    const eEl=ENEMY_ELEMENTS[name]||{emoji:'❓'};
    enemy={
      name,emoji:eEl.emoji||'❓',isBoss:false,
      hp:Math.ceil(base.hp*diffMult),atk:Math.ceil(base.atk*diffMult*.9),
      def:Math.ceil(base.def*diffMult),exp:Math.ceil(base.exp*diffMult),gold:Math.ceil(base.gold*diffMult),
    };
    enemy.maxHp=enemy.hp;
    if(G.kills5>=5)G.miniBossReady=true;
    startBGM('battle');
  }

  G.enemy=enemy;
  log(`⚔️ ${enemy.name} muncul!${enemy.isBoss?' [BOSS]':''}`,enemy.isBoss?'boss':'crit');
  renderScene();updateStatsUI();
}

function showBossWarning(msg){
  const div=document.createElement('div');div.className='notif-overlay';
  div.innerHTML=`<div class="notif-box">
    <div class="notif-icon">⚠️</div>
    <div class="notif-title">BOSS MUNCUL!</div>
    <div class="notif-text">${msg}</div>
    <button class="btn btn-red notif-btn" onclick="this.closest('.notif-overlay').remove()">Hadapi!</button>
  </div>`;
  document.body.appendChild(div);
}

function renderBattle(){
  const el=document.getElementById('scene'),p=G.player,e=G.enemy;
  if(!e)return;
  const pHpPct=Math.max(0,p.hp/p.maxHp*100),eHpPct=Math.max(0,e.hp/e.maxHp*100);
  const pHpColor=pHpPct>60?'var(--hp-green)':pHpPct>30?'var(--hp-yellow)':'var(--hp-red)';
  const eHpColor=eHpPct>60?'var(--hp-green)':eHpPct>30?'var(--hp-yellow)':'var(--hp-red)';

  const skillBtns=p.equippedSkills.map((sk,i)=>{
    if(!sk)return`<button class="action-btn skill-btn" disabled><span class="ab-icon">❓</span><span class="ab-name">Slot ${i+1}</span></button>`;
    const sd=SKILL_DATA[sk]||{},cd=cdTimers[sk]||0;
    const isComboReady=G.combo>=G.comboMax&&sd.type==='combo';
    return`<button class="action-btn skill-btn ${isComboReady?'combo-ready':''}" onclick="useSkill('${sk}')" ${cd>0?'disabled':''}>
      <span class="ab-icon">${sd.emoji||'⚡'}</span><span class="ab-name">${sk}</span>
      <span class="ab-desc">${sd.desc||''}</span>
      ${cd>0?`<span class="ab-cd">CD: ${cd}</span>`:''}</button>`;
  });

  const hasPotion=p.inventory.find(it=>it.type==='potion');
  const statusStr=buildStatusStr();

  const bossSkillsRaw=BOSS_SKILLS[G.enemy?.bossId||'']||[];
  const nextSkill=e.isBoss&&bossSkillsRaw.length?bossSkillsRaw.reduce((a,b)=>a.chargeNeeded<=b.chargeNeeded?a:b):null;
  const bossChargePct=nextSkill?Math.min(100,(G.bossCharge/nextSkill.chargeNeeded)*100):0;

  // Enemy element weakness display
  const eEl=ENEMY_ELEMENTS[e.name];
  const weakTags=eEl?[
    ...eEl.weak.map(el=>`<span class="el-tag el-weak">${el}⬆</span>`),
    ...eEl.resist.map(el=>`<span class="el-tag el-resist">${el}⬇</span>`),
    ...eEl.immune.map(el=>`<span class="el-tag el-immune">${el}✗</span>`),
  ].join(''):'';

  el.innerHTML=`
    <div class="battle-scene">
      <div class="battle-bg" id="battleBg">
        <canvas id="slashCanvas"></canvas>
        <div class="fighter" id="fighterP">
          <span class="fighter-emoji" id="emojiP">${p.job?JOBS[p.job].emoji:'👩'}</span>
          <span class="fighter-name">${p.name}</span>
          ${statusStr?`<span style="font-size:9px;color:var(--orange2);">${statusStr}</span>`:''}
          ${G.combo>0?`<span style="font-size:9px;color:var(--combo-color);font-family:'Cinzel';">${G.combo} COMBO</span>`:''}
        </div>
        <div class="vs-divider">
          <div class="vs-text">VS</div>
          <div class="turn-indicator" id="turnInd">Giliranmu</div>
        </div>
        <div class="fighter" id="fighterE">
          <span class="fighter-emoji" id="emojiE">${e.emoji}</span>
          <span class="fighter-name">${e.name}</span>
          ${e.isBoss?`<span class="boss-tag">⚠ BOSS</span>`:''}
          ${G.bossRage?`<span class="boss-tag" style="color:var(--orange);">⚡ RAGE</span>`:''}
        </div>
      </div>
      <div class="battle-stats">
        <div class="bstat">
          <div class="bstat-label">HP Lyria</div>
          <div class="bstat-bar"><div class="bstat-fill" id="pHpFill" style="width:${pHpPct}%;background:${pHpColor};"></div></div>
          <div class="bstat-text">${Math.ceil(p.hp)} / ${Math.ceil(p.maxHp)}</div>
        </div>
        <div></div>
        <div class="bstat">
          <div class="bstat-label" style="text-align:right;">HP Musuh</div>
          <div class="bstat-bar"><div class="bstat-fill" id="eHpFill" style="width:${eHpPct}%;background:${eHpColor};float:right;"></div></div>
          <div class="bstat-text" style="text-align:right;">${Math.ceil(e.hp)} / ${Math.ceil(e.maxHp)}</div>
        </div>
      </div>
      ${weakTags?`<div class="weakness-bar"><span style="color:var(--text3);font-family:'Cinzel',serif;font-size:9px;">ELEMEN:</span>${weakTags}</div>`:''}
      ${e.isBoss&&nextSkill?`<div class="boss-skill-bar">
        <span style="color:var(--boss-red);font-family:'Cinzel',serif;">${nextSkill.emoji} ${nextSkill.name}</span>
        <div class="boss-charge-bar"><div class="boss-charge-fill" style="width:${bossChargePct}%;"></div></div>
        <span style="color:var(--boss-red);">${G.bossCharge}/${nextSkill.chargeNeeded}</span>
      </div>`:''}
      <div class="battle-actions">
        <div class="action-row">
          <button class="action-btn atk-btn" onclick="playerAttack()">
            <span class="ab-icon">⚔️</span><span class="ab-name">Serang</span><span class="ab-desc">Normal +Combo</span>
          </button>
          ${skillBtns[0]||''} ${skillBtns[1]||''}
        </div>
        <div class="action-row">
          ${skillBtns[2]||'<div style="flex:1"></div>'}
          <button class="action-btn item-btn" onclick="usePotionBattle()" ${hasPotion?'':'disabled'}>
            <span class="ab-icon">🧪</span><span class="ab-name">Potion</span>
            <span class="ab-desc">${hasPotion?hasPotion.name+' (+'+hasPotion.effect+')':'Tidak ada'}</span>
          </button>
          <button class="action-btn flee-btn" onclick="flee()">
            <span class="ab-icon">🏃</span><span class="ab-name">Kabur</span>
            <span class="ab-desc">${e.isBoss?'10%':'45%'}</span>
          </button>
        </div>
      </div>
    </div>
    <div class="log-panel">${G.battleLog.slice(0,12).map(l=>`<div class="log-entry log-${l.type}">${l.msg}</div>`).join('')}</div>`;
  initSlashCanvas();
}

function initSlashCanvas(){
  const canvas=document.getElementById('slashCanvas'),bg=document.getElementById('battleBg');
  if(!canvas||!bg)return;
  canvas.width=bg.offsetWidth;canvas.height=bg.offsetHeight;
}

// ============================================================
// CANVAS EFFECTS — unique per element
// ============================================================
function drawEffect(type,fromSide){
  const canvas=document.getElementById('slashCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  const tx=fromSide==='player'?w*.7:w*.28;const ty=h*.45;
  const sx=fromSide==='player'?w*.25:w*.72;

  if(type==='fire'){
    // Orange-red particle burst + trail
    ctx.globalAlpha=.9;
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2;
      const r=18+Math.random()*28;
      ctx.strokeStyle=i%3===0?'#ff8800':i%3===1?'#ff4400':'#ffcc00';
      ctx.lineWidth=2+Math.random()*2;ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(tx+Math.cos(a)*6,ty+Math.sin(a)*6);
      ctx.lineTo(tx+Math.cos(a)*r+(Math.random()-.5)*12,ty+Math.sin(a)*r+(Math.random()-.5)*12);
      ctx.stroke();
    }
    // Trail
    const grad=ctx.createLinearGradient(sx,h*.35,tx,ty);
    grad.addColorStop(0,'rgba(255,136,0,0)');grad.addColorStop(.7,'rgba(255,68,0,.7)');grad.addColorStop(1,'rgba(255,200,0,0)');
    ctx.strokeStyle=grad;ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(sx,h*.35);ctx.quadraticCurveTo((sx+tx)/2,h*.2,tx,ty);ctx.stroke();

  }else if(type==='ice'){
    // Teal crystal spikes
    ctx.globalAlpha=.85;
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      ctx.strokeStyle=i%2===0?'#40d8c8':'#80fff0';
      ctx.lineWidth=i%2===0?2.5:1.5;
      ctx.beginPath();
      ctx.moveTo(tx,ty);
      ctx.lineTo(tx+Math.cos(a)*36,ty+Math.sin(a)*36);
      ctx.stroke();
      // Small crossbar
      const ex=tx+Math.cos(a)*30,ey=ty+Math.sin(a)*30;
      ctx.beginPath();
      ctx.moveTo(ex+Math.cos(a+Math.PI/2)*8,ey+Math.sin(a+Math.PI/2)*8);
      ctx.lineTo(ex+Math.cos(a-Math.PI/2)*8,ey+Math.sin(a-Math.PI/2)*8);
      ctx.stroke();
    }
    ctx.beginPath();ctx.arc(tx,ty,14,0,Math.PI*2);ctx.strokeStyle='rgba(128,255,240,.7)';ctx.lineWidth=2;ctx.stroke();

  }else if(type==='wind'){
    // Blue swirling arcs
    ctx.globalAlpha=.8;ctx.lineCap='round';
    for(let i=0;i<5;i++){
      const offset=i*10-20;
      ctx.strokeStyle=i%2===0?'var(--blue2)':'#40d8c8';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(sx,h*.35+offset);
      const cpx=(sx+tx)/2+(Math.random()-.5)*40;
      ctx.quadraticCurveTo(cpx,h*.25+offset+(Math.random()-.5)*20,tx+offset*.3,ty+offset*.3);
      ctx.stroke();
    }
    // Swirl circles
    for(let r=8;r<=24;r+=8){
      ctx.strokeStyle='rgba(144,200,255,.4)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*1.5);ctx.stroke();
    }

  }else if(type==='dark'){
    // Purple void spiral
    ctx.globalAlpha=.85;
    for(let i=0;i<14;i++){
      const a=(i/14)*Math.PI*2;const r=16+i*2.8;
      ctx.strokeStyle=i%2===0?'#b060f8':'#d0a0ff';
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(tx+Math.cos(a)*r,ty+Math.sin(a)*r);
      ctx.lineTo(tx+Math.cos(a+.6)*(r+7),ty+Math.sin(a+.6)*(r+7));
      ctx.stroke();
    }
    ctx.strokeStyle='rgba(176,96,248,.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(sx,h*.25);ctx.lineTo(tx,ty);ctx.stroke();
    ctx.beginPath();ctx.arc(tx,ty,12,0,Math.PI*2);ctx.stroke();

  }else if(type==='light'){
    // Gold starburst
    ctx.globalAlpha=.95;
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2;
      const len=i%2===0?44:26;
      ctx.strokeStyle=i%3===0?'#fff880':i%3===1?'#f8d040':'#d4af37';
      ctx.lineWidth=i%2===0?3:2;
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx+Math.cos(a)*len,ty+Math.sin(a)*len);ctx.stroke();
    }
    ctx.beginPath();ctx.arc(tx,ty,18,0,Math.PI*2);ctx.strokeStyle='rgba(248,240,128,.6)';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(tx,ty,38,0,Math.PI*2);ctx.strokeStyle='rgba(248,240,128,.25)';ctx.lineWidth=1;ctx.stroke();

  }else if(type==='poison'){
    // Green droplets
    ctx.globalAlpha=.85;
    for(let i=0;i<8;i++){
      const x=tx+(Math.random()-.5)*55,y=h*.05+Math.random()*(h*.7);
      ctx.fillStyle=i%2===0?'#48d890':'#80ffc0';
      ctx.beginPath();ctx.arc(x,y,3+Math.random()*4,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(72,216,144,.5)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,y-14);ctx.lineTo(x,y-2);ctx.stroke();
    }
    ctx.strokeStyle='rgba(72,216,144,.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(sx,h*.35);ctx.quadraticCurveTo((sx+tx)/2,h*.6,tx,ty);ctx.stroke();

  }else if(type==='physical'){
    // Slash lines
    ctx.globalAlpha=.75;ctx.lineCap='round';
    const colors=['#ff7090','#ff90a8','#ffa0b8'];
    for(let i=0;i<3;i++){
      const off=(i-1)*16;
      ctx.strokeStyle=colors[i];ctx.lineWidth=3-i*.5;
      ctx.beginPath();ctx.moveTo(sx,h*.3+off);
      ctx.quadraticCurveTo((sx+tx)/2+(Math.random()-.5)*20,h*.5+off,tx,h*.65+off);
      ctx.stroke();
    }

  }else if(type==='drain'){
    // Pink wisps
    ctx.globalAlpha=.75;ctx.strokeStyle='var(--boss-red)';ctx.lineWidth=2;
    for(let i=0;i<6;i++){
      const oy=(i-2.5)*12;
      ctx.beginPath();
      ctx.moveTo(w*.28,h*.4+oy);
      ctx.bezierCurveTo(w*.28+35,h*.2+oy,w*.65-35,h*.6+oy,w*.65,h*.4+oy);
      ctx.stroke();
    }

  }else if(type==='rage'){
    // Red expanding rings
    ctx.globalAlpha=.65;
    const cx=fromSide==='enemy'?w*.7:w*.28;
    for(let r=12;r<=52;r+=14){
      ctx.strokeStyle=r<30?'#ff2050':'#ff8844';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(cx,h*.45,r,0,Math.PI*2);ctx.stroke();
    }

  }else{
    // Default
    ctx.globalAlpha=.7;ctx.strokeStyle='var(--red2)';ctx.lineWidth=2.5;ctx.lineCap='round';
    for(let i=0;i<2;i++){
      const off=(i-.5)*14;
      ctx.beginPath();ctx.moveTo(sx,h*.3+off);
      ctx.quadraticCurveTo((sx+tx)/2+(Math.random()-.5)*25,h*.5+off,tx,h*.65+off);
      ctx.stroke();
    }
  }

  setTimeout(()=>{try{ctx.clearRect(0,0,w,h);ctx.globalAlpha=1;}catch(e){}},550);
}

function buildStatusStr(){
  const s=G.statusEffects,parts=[];
  if(s.buffAtkTurns>0)parts.push(`ATK↑${s.buffAtkTurns}`);
  if(s.buffDefTurns>0)parts.push(`DEF↑${s.buffDefTurns}`);
  if(s.critBuffTurns>0)parts.push(`CRIT↑${s.critBuffTurns}`);
  if(s.regenTurns>0)parts.push(`🌸${s.regenTurns}`);
  if(s.poisonTurns>0)parts.push(`☠${s.poisonTurns}`);
  if(s.burnTurns>0)parts.push(`🔥${s.burnTurns}`);
  if(s.stunned>0)parts.push(`😵${s.stunned}`);
  if(s.frozen>0)parts.push(`❄${s.frozen}`);
  if(s.blinded>0)parts.push(`👁${s.blinded}`);
  if(s.cursed>0)parts.push(`💀${s.cursed}`);
  if(s.barrier)parts.push(`🔮`);
  if(s.dodging)parts.push(`👥`);
  return parts.join(' ');
}

function spawnDmgFloat(text,type,isPlayer){
  const ref=document.getElementById(isPlayer?'fighterP':'fighterE');
  const container=document.getElementById('battleBg');
  if(!ref||!container)return;
  const rect=ref.getBoundingClientRect(),bgRect=container.getBoundingClientRect();
  const el=document.createElement('div');
  el.className=`dmg-float dmg-${type}`;el.textContent=text;
  el.style.cssText=`position:absolute;left:${rect.left-bgRect.left+rect.width/2-22}px;top:${rect.top-bgRect.top-10}px;`;
  container.style.position='relative';container.appendChild(el);
  setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},1200);
}

function animFighter(id,cls){
  const el=document.getElementById(id);if(!el)return;
  el.classList.remove('anim-attack-r','anim-attack-l','anim-take-dmg','anim-death','anim-victory',
    'anim-fire','anim-ice','anim-dark','anim-light','anim-lightning','anim-poison','anim-rage','anim-wind',
    'anim-crit-flash','anim-heal-flash','anim-boss-skill','anim-combo-flash');
  void el.offsetWidth;el.classList.add(cls);
  if(cls!=='anim-death')setTimeout(()=>el.classList.remove(cls),700);
}

function patchBattleUI(){
  const p=G.player,e=G.enemy;if(!e)return;
  const pHpPct=Math.max(0,p.hp/p.maxHp*100),eHpPct=Math.max(0,e.hp/e.maxHp*100);
  const pHpColor=pHpPct>60?'var(--hp-green)':pHpPct>30?'var(--hp-yellow)':'var(--hp-red)';
  const eHpColor=eHpPct>60?'var(--hp-green)':eHpPct>30?'var(--hp-yellow)':'var(--hp-red)';
  const pf=document.getElementById('pHpFill'),ef=document.getElementById('eHpFill');
  if(pf){pf.style.width=pHpPct+'%';pf.style.background=pHpColor;}
  if(ef){ef.style.width=eHpPct+'%';ef.style.background=eHpColor;}
  const texts=document.querySelectorAll('.bstat-text');
  if(texts[0])texts[0].textContent=Math.ceil(p.hp)+' / '+Math.ceil(p.maxHp);
  if(texts[1])texts[1].textContent=Math.ceil(e.hp)+' / '+Math.ceil(e.maxHp);
  p.equippedSkills.forEach((sk,i)=>{
    if(!sk)return;
    const cd=cdTimers[sk]||0,btns=document.querySelectorAll('.action-btn.skill-btn'),btn=btns[i];
    if(!btn)return;btn.disabled=cd>0;
    let cdEl=btn.querySelector('.ab-cd');
    if(cd>0){if(!cdEl){cdEl=document.createElement('span');cdEl.className='ab-cd';btn.appendChild(cdEl);}cdEl.textContent='CD: '+cd;}
    else if(cdEl)cdEl.remove();
  });
  const hasPotion=p.inventory.find(it=>it.type==='potion'),potBtn=document.querySelector('.action-btn.item-btn');
  if(potBtn){potBtn.disabled=!hasPotion;const de=potBtn.querySelector('.ab-desc');if(de)de.textContent=hasPotion?hasPotion.name+' (+'+hasPotion.effect+')':'Tidak ada';}
  const logEl=document.querySelector('.log-panel');
  if(logEl)logEl.innerHTML=G.battleLog.slice(0,12).map(l=>`<div class="log-entry log-${l.type}">${l.msg}</div>`).join('');
  const chargeBar=document.querySelector('.boss-charge-fill');
  const bossSkillsRaw=BOSS_SKILLS[G.enemy?.bossId||'']||[];
  const nextSkill=e.isBoss&&bossSkillsRaw.length?bossSkillsRaw.reduce((a,b)=>a.chargeNeeded<=b.chargeNeeded?a:b):null;
  if(chargeBar&&nextSkill)chargeBar.style.width=Math.min(100,(G.bossCharge/nextSkill.chargeNeeded)*100)+'%';
  updateStatsUI();
}

// ============================================================
// PLAYER ACTIONS
// ============================================================
function playerAttack(){
  if(G.battleBlocked||G.phase!=='battle')return;
  G.battleBlocked=true;
  const p=G.player,e=G.enemy;
  const atk=Math.ceil(p.atk+(G.statusEffects.buffAtk||0));
  const critRate=.12+(G.statusEffects.critBuffTurns>0?G.statusEffects.critBuff||0:0);
  const isCrit=Math.random()<critRate;
  const comboMult=getComboMult();
  let dmg=Math.max(1,atk-Math.floor(e.def*.7)+Math.floor(Math.random()*6)-3);
  if(isCrit)dmg=Math.floor(dmg*2);
  dmg=Math.floor(dmg*comboMult);
  e.hp-=dmg;
  addCombo(1);
  animFighter('emojiP','anim-attack-r');
  animFighter('fighterE',isCrit?'anim-crit-flash':'anim-take-dmg');
  if(G.combo>=G.comboMax)animFighter('battleBg','anim-combo-flash');
  drawEffect('physical','player');
  setTimeout(()=>spawnDmgFloat(isCrit?`💥${dmg}!`:dmg,isCrit?'critical':'normal',false),200);
  sfx(isCrit?'critical':'attack');
  if(G.combo>1){sfx('combo_hit');setTimeout(()=>{if(G.combo>=G.comboMax)sfx('combo_burst');},200);}
  log(`${isCrit?'💥 CRITICAL! ':''}Lyria menyerang: ${dmg} damage!${G.combo>1?' ('+G.combo+' COMBO! x'+comboMult.toFixed(1)+')':''}`,isCrit?'crit':'dmg');
  tickCooldowns();tickStatus();
  if(e.hp<=0){setTimeout(()=>endBattle(true),500);return;}
  patchBattleUI();refreshShop();
  setTimeout(enemyTurn,800);
}

function useSkill(sk){
  if(G.battleBlocked||G.phase!=='battle')return;
  if(cdTimers[sk]>0)return;
  G.battleBlocked=true;
  const sd=SKILL_DATA[sk];if(!sd){G.battleBlocked=false;return;}
  const p=G.player,e=G.enemy;
  const atk=Math.ceil(p.atk+(G.statusEffects.buffAtk||0));
  const critRate=.15+(G.statusEffects.critBuffTurns>0?G.statusEffects.critBuff||0:0);
  cdTimers[sk]=sd.cd+1;

  // Element weakness calculation
  const elemData=getElementMult(sd.element||'physical',e.name);
  const elemMult=elemData.mult;
  const comboMult=getComboMult();

  // Play element-specific sfx
  const elemSfx=ELEMENT_SFX[sd.element]||'attack';
  sfx(elemSfx);

  if(sd.type==='attack'||sd.type==='magic'||sd.type==='combo'){
    const isCrit=Math.random()<critRate;
    let dmg=Math.max(1,Math.floor(atk*sd.mult*elemMult*comboMult)-Math.floor(e.def*.4)+Math.floor(Math.random()*8));
    if(isCrit)dmg=Math.floor(dmg*1.65);
    e.hp-=dmg;
    addCombo(sd.type==='combo'?3:2);
    const animMap={fire:'anim-fire',ice:'anim-ice',wind:'anim-wind',dark:'anim-dark',light:'anim-light',poison:'anim-poison',physical:'anim-attack-r'};
    animFighter('emojiP','anim-attack-r');
    animFighter('fighterE',isCrit?'anim-crit-flash':(animMap[sd.element]||'anim-take-dmg'));
    if(G.combo>=G.comboMax)animFighter('battleBg','anim-combo-flash');
    drawEffect(sd.element||'physical','player');
    const dmgType=sd.element||'normal';
    setTimeout(()=>{
      spawnDmgFloat(`${sd.emoji}${dmg}`,isCrit?'critical':dmgType,false);
      if(elemData.label)setTimeout(()=>spawnDmgFloat(elemData.label,elemData.label==='WEAK!'?'weak':'miss',false),300);
    },220);
    let logMsg=`${sd.emoji} ${sk}: ${dmg} damage!${isCrit?' CRITICAL!':''}`;
    if(elemData.label==='WEAK!')logMsg+=' 🔥WEAK!';
    if(elemData.label==='Resist')logMsg+=' (Resist)';
    if(elemData.label==='IMMUNE')logMsg+=' (IMMUNE)';
    if(G.combo>1)logMsg+=` ${G.combo} COMBO!`;
    log(logMsg,isCrit?'crit':elemData.label==='WEAK!'?'weak':'dmg');
  }else if(sd.type==='heal'){
    const mult=sk.includes('Sacred')?0.38:sk.includes('Brew')?0.30:0.40;
    const healAmt=Math.floor(p.maxHp*mult);
    p.hp=Math.min(p.maxHp,p.hp+healAmt);
    if(sk.includes('Brew')){G.statusEffects.buffAtk=Math.floor(atk*.25);G.statusEffects.buffAtkTurns=2;}
    drawEffect('light','player');spawnDmgFloat(`+${healAmt}`,'heal',true);
    log(`${sd.emoji} ${sk}: Heal ${healAmt} HP!`+(sk.includes('Brew')?' + ATK buff!':''),'heal');
  }else if(sd.type==='buff'){
    if(sk==='Blood Frenzy'){
      const cost=Math.floor(p.maxHp*.08);p.hp=Math.max(1,p.hp-cost);
      G.statusEffects.buffAtk=Math.floor(atk*.5);G.statusEffects.buffAtkTurns=3;
      drawEffect('fire','player');log(`🩸 Blood Frenzy: ATK +50%! (-${cost} HP)`,'crit');
    }else if(sk==='Berserk Aura'){
      G.statusEffects.buffAtk=Math.floor(atk*.3);G.statusEffects.buffAtkTurns=4;
      drawEffect('fire','player');log(`🔥 Berserk Aura: ATK +30% 4 ronde!`,'crit');
    }else if(sk==='Eagle Eye'){
      G.statusEffects.critBuff=.35;G.statusEffects.critBuffTurns=3;
      drawEffect('light','player');log(`🦅 Eagle Eye: CRIT +35% 3 ronde!`,'crit');
    }
  }else if(sd.type==='defense'){
    if(sk==='Guardian Stance'){G.statusEffects.buffDef=Math.floor(p.def*.6);G.statusEffects.buffDefTurns=2;}
    else{G.statusEffects.barrier=true;}
    drawEffect('light','player');log(`${sd.emoji} ${sk}: Pertahanan aktif!`,'info');
  }else if(sd.type==='dodge'){
    G.statusEffects.dodging=true;
    drawEffect('dark','player');log(`${sd.emoji} Phase Step: Siap dodge serangan berikutnya!`,'info');
  }else if(sd.type==='dot'){
    const dot=Math.floor(atk*.2);G.statusEffects.poisoned=dot;G.statusEffects.poisonTurns=3;
    let dmg=Math.max(1,Math.floor(atk*sd.mult*elemMult));e.hp-=dmg;
    animFighter('fighterE','anim-poison');drawEffect('poison','player');
    spawnDmgFloat(`☠${dmg}`,'poison',false);
    log(`☠️ ${sk}: ${dmg} damage + racun ${dot}/ronde!`,'dmg');
  }

  tickCooldowns();tickStatus();
  if(e.hp<=0){setTimeout(()=>endBattle(true),500);return;}
  patchBattleUI();refreshShop();
  setTimeout(enemyTurn,800);
}

function usePotionBattle(){
  if(G.battleBlocked)return;
  G.battleBlocked=true;
  const potion=G.player.inventory.find(it=>it.type==='potion');if(!potion){G.battleBlocked=false;return;}
  const healed=Math.min(potion.effect,G.player.maxHp-G.player.hp);
  G.player.hp=Math.min(G.player.maxHp,G.player.hp+potion.effect);
  G.player.inventory.splice(G.player.inventory.indexOf(potion),1);
  spawnDmgFloat(`+${healed}`,'heal',true);sfx('heal');
  log(`🧪 ${potion.name}: Heal ${healed} HP!`,'heal');
  tickCooldowns();tickStatus();patchBattleUI();refreshShop();
  setTimeout(enemyTurn,720);
}

function tickCooldowns(){for(const k in cdTimers)if(cdTimers[k]>0)cdTimers[k]--;}

function tickStatus(){
  const s=G.statusEffects,p=G.player;
  if(s.buffAtkTurns>0){s.buffAtkTurns--;if(s.buffAtkTurns===0)s.buffAtk=0;}
  if(s.buffDefTurns>0){s.buffDefTurns--;if(s.buffDefTurns===0)s.buffDef=0;}
  if(s.critBuffTurns>0){s.critBuffTurns--;if(s.critBuffTurns===0)s.critBuff=0;}
  if(s.regenTurns>0){s.regenTurns--;const regen=Math.min(s.regen,p.maxHp-p.hp);p.hp+=regen;if(regen>0){spawnDmgFloat('+'+regen,'heal',true);log(`🌸 Regen: +${regen} HP`,'heal');}}
  if(s.poisonTurns>0){s.poisonTurns--;p.hp=Math.max(1,p.hp-s.poisoned);spawnDmgFloat('-'+s.poisoned,'poison',true);log(`☠️ Keracunan: -${s.poisoned} HP`,'dmg');}
  if(s.burnTurns>0){s.burnTurns--;const bd=s.burned;p.hp=Math.max(1,p.hp-bd);spawnDmgFloat('-'+bd,'fire',true);log(`🔥 Terbakar: -${bd} HP`,'dmg');}
  if(s.stunned>0)s.stunned--;
  if(s.frozen>0)s.frozen--;
  if(s.blinded>0)s.blinded--;
  if(s.cursed>0){s.cursed--;if(s.curseVal>0){const def_loss=s.curseVal;}}
  if(G.bossRageTurns>0){G.bossRageTurns--;if(G.bossRageTurns===0)G.bossRage=false;}
}

// ============================================================
// ENEMY TURN
// ============================================================
function enemyTurn(){
  if(G.phase!=='battle')return;
  const p=G.player,e=G.enemy;
  const turnEl=document.getElementById('turnInd');
  if(turnEl)turnEl.textContent="Giliran Musuh";

  if(e.isBoss){
    G.bossCharge++;
    const bossSkills=BOSS_SKILLS[e.bossId]||[];
    const ready=bossSkills.filter(sk=>G.bossCharge>=sk.chargeNeeded).sort((a,b)=>b.chargeNeeded-a.chargeNeeded);
    if(ready.length){
      const skill=ready[0];G.bossCharge=0;
      executeBossSkill(skill,e,p,turnEl);
      return;
    }
  }

  if(G.statusEffects.stunned>0||G.statusEffects.frozen>0){
    log(`${e.name} dalam kondisi ${G.statusEffects.stunned>0?'stun':'beku'}!`,'info');
    G.battleBlocked=false;patchBattleUI();if(turnEl)turnEl.textContent="Giliranmu";return;
  }

  // Blind increases miss
  const baseMissChance=.08+(p.def*.007)+(G.statusEffects.blinded>0?.35:0);
  if(Math.random()<Math.min(.35,baseMissChance)){
    spawnDmgFloat('MISS','miss',false);sfx('miss');
    log(`${e.name} meleset!${G.statusEffects.blinded>0?' (buta!)':''}`,G.statusEffects.blinded>0?'warn':'miss');
    G.battleBlocked=false;patchBattleUI();if(turnEl)turnEl.textContent="Giliranmu";return;
  }

  if(G.statusEffects.dodging){
    spawnDmgFloat('DODGE','miss',true);sfx('miss');
    log(`Lyria menghindar!`,'miss');
    G.statusEffects.dodging=false;G.battleBlocked=false;patchBattleUI();
    if(turnEl)turnEl.textContent="Giliranmu";return;
  }
  if(G.statusEffects.barrier){
    spawnDmgFloat('BLOCK','miss',true);
    log(`Barrier menyerap serangan!`,'info');
    G.statusEffects.barrier=false;G.battleBlocked=false;patchBattleUI();
    if(turnEl)turnEl.textContent="Giliranmu";return;
  }

  const def=Math.ceil(p.def+(G.statusEffects.buffDef||0));
  const curseDebuff=G.statusEffects.cursed>0?G.statusEffects.curseVal||0:0;
  const rageMultiplier=G.bossRage?1.75:1;
  let dmg=Math.max(1,Math.floor(e.atk*rageMultiplier)-Math.max(0,def-curseDebuff)+Math.floor(Math.random()*5)-2);
  const isEnemyCrit=e.isBoss&&Math.random()<.16;
  if(isEnemyCrit)dmg=Math.floor(dmg*1.85);
  p.hp-=dmg;

  // Reset combo on taking damage
  resetCombo();

  animFighter('emojiE','anim-attack-l');
  animFighter('fighterP',isEnemyCrit?'anim-crit-flash':'anim-take-dmg');
  drawEffect('physical','enemy');
  setTimeout(()=>spawnDmgFloat(isEnemyCrit?`💢${dmg}`:dmg,isEnemyCrit?'critical':'normal',true),200);
  sfx('hurt');
  log(`${e.name} menyerang! ${dmg} damage!${isEnemyCrit?' CRITICAL!':''}${G.bossRage?' ⚡RAGE!':''}`,isEnemyCrit?'crit':'dmg');

  if(p.hp<=0){sfx('death_player');animFighter('emojiP','anim-death');animFighter('playerAvatar','dead');setTimeout(checkDead,1100);return;}
  G.battleBlocked=false;if(turnEl)turnEl.textContent="Giliranmu";patchBattleUI();
}

function executeBossSkill(skill,e,p,turnEl){
  sfx('boss_skill');
  // Play element-specific boss sfx
  const bossElemSfx={fire:'boss_fire',ice:'boss_ice',dark:'boss_dark',light:'boss_skill',wind:'wind',physical:'attack'};
  setTimeout(()=>sfx(bossElemSfx[skill.type]||'boss_skill'),200);

  log(`💀 ${e.name}: ${skill.emoji} "${skill.name}" — ${skill.desc}`,'boss');

  const typeAnimMap={fire:'anim-fire',ice:'anim-ice',dark:'anim-dark',light:'anim-light',wind:'anim-wind',drain:'anim-rage',poison:'anim-poison',rage:'anim-rage'};
  animFighter('emojiE',typeAnimMap[skill.type]||'anim-crit-flash');
  animFighter('battleBg','anim-boss-skill');
  drawEffect(skill.type,'enemy');

  const def=Math.ceil(p.def+(G.statusEffects.buffDef||0));

  setTimeout(()=>{
    if(skill.dmgMult>0){
      let dmg=Math.max(1,Math.floor(e.atk*skill.dmgMult)-Math.floor(def*.5)+Math.floor(Math.random()*10));

      if(G.statusEffects.dodging){
        spawnDmgFloat('DODGE','miss',true);sfx('miss');
        log(`Lyria menghindar dari ${skill.name}!`,'miss');
        G.statusEffects.dodging=false;
      }else if(G.statusEffects.barrier&&skill.dmgMult<4){
        spawnDmgFloat('BLOCK','miss',true);
        log(`Barrier menyerap ${skill.name}!`,'info');
        G.statusEffects.barrier=false;
      }else{
        if(skill.effect==='drain'){const healed=Math.floor(dmg*.65);e.hp=Math.min(e.maxHp,e.hp+healed);log(`💉 ${e.name} menyerap ${healed} HP!`,'boss');}
        if(skill.effect==='stun'){G.statusEffects.stunned=2;log(`😵 Lyria terstun 2 ronde!`,'warn');}
        if(skill.effect==='burn'){G.statusEffects.burned=Math.floor(dmg*.15);G.statusEffects.burnTurns=3;log(`🔥 Terbakar! -${G.statusEffects.burned}/ronde!`,'warn');}
        if(skill.effect==='curse'){G.statusEffects.cursed=3;G.statusEffects.curseVal=Math.floor(def*.4);log(`💀 Dikutuk! DEF -${G.statusEffects.curseVal} 3 ronde!`,'warn');}
        if(skill.effect==='blind'){G.statusEffects.blinded=2;log(`👁️ Dibutakan 2 ronde!`,'warn');}
        if(skill.name==='Brother\'s Grief')dmg=Math.floor(p.hp*.42)+Math.floor(e.atk*1.5);
        p.hp-=dmg;resetCombo();
        animFighter('fighterP','anim-take-dmg');
        const dmgType=skill.type==='fire'?'fire':skill.type==='ice'?'ice':skill.type==='dark'||skill.type==='drain'?'dark':skill.type==='light'?'light':'boss';
        spawnDmgFloat(`${skill.emoji}${dmg}`,dmgType,true);
        log(`💥 ${skill.name}: ${dmg} damage!`,'boss');
      }
    }
    if(skill.effect==='rage'){
      G.bossRage=true;G.bossRageTurns=2;
      log(`⚡ ${e.name} dalam RAGE! ATK melonjak!`,'boss');
    }
    if(p.hp<=0){sfx('death_player');animFighter('emojiP','anim-death');setTimeout(checkDead,1100);return;}
    G.battleBlocked=false;if(turnEl)turnEl.textContent="Giliranmu";patchBattleUI();
  },650);
}

function checkDead(){
  G.player.hp=0;G.phase='dead';stopBGM();
  const overlay=document.createElement('div');overlay.className='death-overlay';
  document.body.appendChild(overlay);
  setTimeout(()=>{if(overlay.parentNode)overlay.remove();},1800);
  setTimeout(()=>{renderScene();updateStatsUI();},1200);
}

function flee(){
  if(G.battleBlocked)return;
  const fleeChance=G.enemy.isBoss?.1:.45;
  if(Math.random()<fleeChance){
    sfx('flee');log("🏃 Lyria kabur!",'info');
    G.phase='idle';G.enemy=null;G.battleBlocked=false;resetCombo();
    stopBGM();startBGM('explore');refreshShop();
  }else{
    log("Gagal kabur!",'warn');G.battleBlocked=true;
    setTimeout(enemyTurn,750);
  }
  renderScene();
}

function endBattle(won){
  if(!won){checkDead();return;}
  const e=G.enemy;
  G.player.gold+=e.gold;G.player.exp+=e.exp;G.player.totalKills++;
  if(e.isBoss){G.player.bossKills++;G.player.defeatedBosses.push(e.name);}
  animFighter('emojiP','anim-victory');
  sfx(e.isBoss?'levelup':'death_enemy');
  if(e.isBoss)sfx('gold');
  log(`✅ ${e.name} dikalahkan!`,'heal');
  log(`+${e.exp} EXP | +${e.gold} Gold`,'crit');
  const dropChance=e.isBoss?.7:.30;
  if(Math.random()<dropChance){
    const pool=e.isBoss?DROP_POOL.filter(i=>i.rarity==='rare'||i.rarity==='epic'||i.rarity==='legendary'):DROP_POOL;
    const drop=pool[Math.floor(Math.random()*pool.length)];
    if(drop){G.player.inventory.push({...drop});log(`📦 Drop: ${drop.emoji} ${drop.name} [${drop.rarity}]!`,'drop');}
  }
  G.phase='idle';G.enemy=null;G.battleBlocked=false;G.bossRage=false;
  stopBGM();startBGM('explore');refreshShop();
  checkLevelUp();checkMapUnlock();
  calcStats();updateStatsUI();renderScene();renderSidebar();
}

function checkLevelUp(){
  const p=G.player;
  while(p.exp>=p.maxExp){
    p.exp-=p.maxExp;p.level++;
    p.maxExp=Math.floor(100+(p.level-1)*52);
    p.baseMaxHp+=20+Math.floor(p.level*1.6);
    p.baseAtk+=2;p.baseDef+=1;p.hp=p.maxHp;
    sfx('levelup');log(`⭐ LEVEL UP! Level ${p.level}!`,'lv');
    const lvEl=document.getElementById('lvBadge');
    if(lvEl){lvEl.classList.remove('levelup');void lvEl.offsetWidth;lvEl.classList.add('levelup');}
    if(p.level===7&&!p.job){setTimeout(()=>showJobSelect(false),600);break;}
    if(p.level===15&&p.job&&!p.jobUpgrade){setTimeout(()=>showJobUpgrade(false),600);break;}
    if(p.level===25&&!p.job2){setTimeout(()=>showJobSelect(true),600);break;}
    if(p.level===45&&p.job2&&!p.job2Upgrade){setTimeout(()=>showJobUpgrade(true),600);break;}
  }
  calcStats();
}

function checkMapUnlock(){
  const p=G.player;
  ZONES.forEach(zone=>zone.maps.forEach(m=>{
    if(p.level>=m.minLevel&&!p.unlockedMaps.includes(m.id)){
      p.unlockedMaps.push(m.id);
      log(`🗺️ Peta baru: ${m.emoji} ${m.name} terbuka!`,'info');
    }
  }));
  // Zone unlock
  if(p.level>=12&&G.player.currentZone<1){
    const nextZone=ZONES[1];if(nextZone&&nextZone.maps[0]&&!p.unlockedMaps.includes(nextZone.maps[0].id)){
      p.unlockedMaps.push(nextZone.maps[0].id);
      log(`✨ ZONA BARU TERBUKA: ${nextZone.name}!`,'lv');
    }
  }
}

function showJobSelect(is2){G.phase=is2?'job2_select':'job_select';renderScene();}
function showJobUpgrade(is2){G.phase=is2?'job2_upgrade':'job_upgrade';renderScene();}

function renderJobSelect(is2){
  const p=G.player,title=is2?"PILIH JOB KEDUA (Level 25)":"PILIH KELAS LYRIA (Level 7)";
  const cards=Object.entries(JOBS).map(([key,j])=>{
    const disabled=is2&&key===p.job;
    return`<div class="job-card ${disabled?'disabled':''}" onclick="${!disabled?`selectJob('${key}',${is2})`:''}">
      <span class="job-emoji">${j.emoji}</span><div class="job-name">${j.name}</div>
      <div class="job-desc">${j.desc}</div>
      <div class="job-stats">ATK+${j.bonus.atk} DEF+${j.bonus.def} HP+${j.bonus.hp}</div></div>`;
  }).join('');
  document.getElementById('scene').innerHTML=`<div class="story-box anim-enter-r">
    <div class="story-title">${title}</div>
    <div class="story-text" style="text-align:center;margin-bottom:10px;">${is2?"Job kedua memberikan 45% bonus":"Pilih kelas yang cocok untuk Lyria"}</div>
    <div class="job-grid">${cards}</div></div>`;
}

function selectJob(key,is2){
  const p=G.player;
  if(is2){p.job2=key;log(`✨ Job Kedua: ${JOBS[key].name}!`,'lv');const sk=JOBS[key].skills[0];const empty=p.equippedSkills.indexOf(null);if(empty>=0){p.equippedSkills[empty]=sk;}}
  else{p.job=key;log(`⭐ Lyria menjadi ${JOBS[key].name}!`,'lv');p.equippedSkills[0]=JOBS[key].skills[0];log(`Skill ${JOBS[key].skills[0]} dipasang!`,'info');}
  sfx('levelup');calcStats();p.hp=Math.min(p.hp,p.maxHp);
  G.phase='idle';updateStatsUI();renderScene();renderSidebar();
  showLevelUpNotif(is2?'Job Kedua!':'Kelas Dipilih!',JOBS[key].emoji+' '+JOBS[key].name);
}

function renderJobUpgrade(is2){
  const p=G.player,baseJob=is2?p.job2:p.job,upgrades=JOB_UPGRADES[baseJob];
  document.getElementById('scene').innerHTML=`<div class="story-box anim-enter-r">
    <div class="story-title">UPGRADE: ${JOBS[baseJob].name}</div>
    <div class="story-text" style="text-align:center;margin-bottom:10px;">Pilih spesialisasi Lyria</div>
    <div class="job-grid">${upgrades.map((u,i)=>`<div class="job-card" onclick="selectJobUpgrade(${i},${is2})">
      <span class="job-emoji">${u.emoji}</span><div class="job-name">${u.name}</div>
      <div class="job-desc">${u.desc}</div>
      <div class="job-stats">ATK+${u.bonus.atk} DEF+${u.bonus.def} HP+${u.bonus.hp}</div></div>`).join('')}
    </div></div>`;
}

function selectJobUpgrade(idx,is2){
  const p=G.player,baseJob=is2?p.job2:p.job,u=JOB_UPGRADES[baseJob][idx];
  if(is2)p.job2Upgrade=u.name;else p.jobUpgrade=u.name;
  sfx('levelup');log(`🌟 ${u.name}!`,'lv');
  calcStats();G.phase='idle';updateStatsUI();renderScene();
  showLevelUpNotif('Kelas Diupgrade!',u.emoji+' '+u.name);
}

function showLevelUpNotif(title,sub){
  const div=document.createElement('div');div.className='notif-overlay';
  div.innerHTML=`<div class="notif-box pink-border">
    <div class="notif-icon">💖</div><div class="notif-title pink">${title}</div>
    <div class="notif-text">${sub}</div>
    <button class="btn btn-pink notif-btn" onclick="this.closest('.notif-overlay').remove()">Lanjut!</button>
  </div>`;
  document.body.appendChild(div);
}

function renderDead(){
  const p=G.player;
  document.getElementById('scene').innerHTML=`<div class="story-box" style="text-align:center;">
    <div style="font-size:56px;margin-bottom:10px;filter:grayscale(1);">💔</div>
    <div class="story-title" style="color:var(--red2);">LYRIA JATUH...</div>
    <div class="story-text" style="font-style:italic;">"Tidak... aku tidak boleh menyerah. Kakakku masih menungguku..."</div>
    <div class="story-text">Kehilangan ${Math.floor(p.gold*.2)} gold.</div>
    <div class="btn-row" style="justify-content:center;margin-top:12px;">
      <button class="btn btn-pink" onclick="revivePlayer()">💖 Bangkit Kembali</button>
    </div></div>`;
}

function revivePlayer(){
  const p=G.player,goldLoss=Math.floor(p.gold*.2);
  p.gold=Math.max(0,p.gold-goldLoss);p.hp=Math.floor(p.maxHp*.4);
  G.phase='idle';G.enemy=null;G.battleBlocked=false;resetCombo();
  G.statusEffects={stunned:0,frozen:0,dodging:false,barrier:false,buffAtk:0,buffAtkTurns:0,buffDef:0,buffDefTurns:0,regen:0,regenTurns:0,poisoned:0,poisonTurns:0,burned:0,burnTurns:0,critBuff:0,critBuffTurns:0,blinded:0,cursed:0,curseVal:0};
  G.bossRage=false;cdTimers={};
  startBGM('explore');
  log(`💖 Lyria bangkit. -${goldLoss} gold.`,'warn');
  updateStatsUI();renderScene();
}

function renderOutro(){
  const p=G.player;
  document.getElementById('scene').innerHTML=`<div class="outro-box anim-enter-r">
    <div style="font-size:64px;margin-bottom:14px;">💖</div>
    <div class="story-title">SELAMAT, LYRIA!</div>
    <div class="story-dialogue">
      <div class="story-speaker">Kaelion (Kakak Lyria):</div>
      "L-Lyria... kamu datang... Maafkan aku... kamu berhasil membebaskanku dari kegelapan ini."
    </div>
    <div class="story-text" style="text-align:center;font-style:italic;">Kekuatan gelap perlahan menghilang dari tubuh Kaelion. Air mata Lyria jatuh — bukan karena kesedihan, tapi karena lega. Dunia diselamatkan bukan oleh kekerasan semata, tapi oleh cinta seorang adik.</div>
    <div style="background:var(--dark3);border:1px solid var(--border);border-radius:7px;padding:10px;margin:12px 0;font-size:11px;">
      <div style="color:var(--pink2);font-family:'Cinzel',serif;margin-bottom:5px;">📊 STATISTIK AKHIR</div>
      <div style="color:var(--text2);">Level: ${p.level} | Kill: ${p.totalKills} | Boss: ${p.bossKills}</div>
      <div style="color:var(--text2);">Gold: ${p.gold} | Kelas: ${p.jobUpgrade||JOBS[p.job]?.name||'-'}</div>
    </div>
    <button class="btn btn-pink" onclick="location.reload()">🔄 Mulai Lagi</button></div>`;
}

function renderScene(){
  updateStatsUI();renderSidebar();
  switch(G.phase){
    case 'intro':renderIntro();break;
    case 'idle':renderIdle();break;
    case 'battle':renderBattle();break;
    case 'dead':renderDead();break;
    case 'outro':renderOutro();break;
    case 'shop':renderShop();break;
    case 'job_select':renderJobSelect(false);break;
    case 'job_upgrade':renderJobUpgrade(false);break;
    case 'job2_select':renderJobSelect(true);break;
    case 'job2_upgrade':renderJobUpgrade(true);break;
  }
}

renderScene();
</script>
</body>
</html>
