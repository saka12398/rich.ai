<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dragon's Quest II: Lyria's Awakening</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#d4af37;--gold-light:#f0d060;--dark:#0a0814;--dark2:#110e1c;--dark3:#181428;--dark4:#1f1934;
  --panel:#1b1630;--border:#352854;--border2:#463868;--text:#ede6f8;--text2:#a898c8;--text3:#6a5888;
  --red:#e84860;--red2:#ff7090;--green:#48d890;--green2:#80ffc0;--blue:#5898f8;--blue2:#90c8ff;
  --purple:#b060f8;--purple2:#d0a0ff;--orange:#f89050;--orange2:#ffb880;--yellow:#f8e048;--yellow2:#fff880;
  --pink:#f860a8;--pink2:#ff90c8;--teal:#40d8c8;--teal2:#80fff0;
  --hp-green:#40d870;--hp-yellow:#f8d840;--hp-red:#f84050;--boss-red:#ff1850;
  --combo-color:#f8d040;--combo2:#fff060;
  --sidebar-w:195px;--right-w:200px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--dark);color:var(--text);display:flex;flex-direction:column;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(176,96,248,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(248,96,168,.04) 0%,transparent 50%),radial-gradient(ellipse at 50% 90%,rgba(64,216,200,.03) 0%,transparent 40%);}

/* ===== HEADER ===== */
.header{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:linear-gradient(90deg,rgba(10,8,20,.98),rgba(26,18,44,.98));border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
.header h1{font-family:'Cinzel',serif;font-size:clamp(12px,2.2vw,17px);color:var(--gold);letter-spacing:2px;text-shadow:0 0 30px rgba(248,176,64,.5);white-space:nowrap;}
.header-sub{font-size:9px;color:var(--pink2);font-family:'Crimson Pro',serif;font-style:italic;display:block;line-height:1;}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.zone-badge{font-family:'Cinzel',serif;font-size:clamp(8px,1.4vw,10px);color:var(--text2);background:rgba(53,40,84,.6);border:1px solid var(--border);padding:3px 8px;border-radius:20px;white-space:nowrap;}
.combo-badge{font-family:'Cinzel',serif;font-size:10px;color:var(--combo-color);background:rgba(248,208,64,.1);border:1px solid var(--combo-color);padding:2px 8px;border-radius:20px;display:none;animation:comboPulse .4s ease;}
@keyframes comboPulse{0%{transform:scale(.8);opacity:.5}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.sound-btn{background:rgba(53,40,84,.5);border:1px solid var(--border);color:var(--text2);padding:3px 8px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .2s;}
.sound-btn:hover{border-color:var(--gold);color:var(--gold);}
.sound-btn.muted{opacity:.5;}

/* ===== MAIN LAYOUT ===== */
.main{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ===== SIDEBAR LEFT ===== */
.sidebar-left{width:var(--sidebar-w);background:rgba(17,14,28,.95);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s;}
.player-card{padding:10px;border-bottom:1px solid var(--border);}
.player-avatar{font-size:clamp(32px,5vw,42px);text-align:center;margin-bottom:4px;line-height:1;transition:transform .3s;}
.player-avatar.hurt{animation:avatarHurt .5s ease;}
.player-avatar.dead{animation:avatarDead 1s ease forwards;}
@keyframes avatarHurt{0%{transform:translateX(0) scale(1)}20%{transform:translateX(-8px) scale(.9)}40%{transform:translateX(8px) scale(.95)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0) scale(1)}}
@keyframes avatarDead{0%{transform:rotate(0) scale(1);opacity:1}30%{transform:rotate(-20deg) scale(1.1)}60%{transform:rotate(90deg) scale(.8)}100%{transform:rotate(90deg) scale(.6);opacity:.3;filter:grayscale(1)}}
.player-name{font-family:'Cinzel',serif;font-size:12px;color:var(--pink2);text-align:center;margin-bottom:1px;}
.player-job{font-size:10px;color:var(--text2);text-align:center;margin-bottom:6px;}
.level-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.level-badge{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-family:'Cinzel',serif;font-size:11px;font-weight:700;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .3s;box-shadow:0 0 10px rgba(176,96,248,.4);}
.level-badge.levelup{animation:levelPop .6s ease;}
@keyframes levelPop{0%{transform:scale(1)}40%{transform:scale(1.6)}70%{transform:scale(.9)}100%{transform:scale(1)}}
.exp-mini{flex:1;}
.exp-bar-wrap{background:var(--dark4);border:1px solid var(--border);border-radius:3px;height:5px;overflow:hidden;margin-bottom:1px;}
.exp-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .5s;border-radius:3px;}
.exp-text{font-size:9px;color:var(--text3);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:5px;}
.stat-box{background:var(--dark3);border:1px solid var(--border);border-radius:5px;padding:3px 5px;text-align:center;}
.stat-box-label{font-size:9px;color:var(--text3);font-family:'Cinzel',serif;}
.stat-box-value{font-size:12px;color:var(--pink2);font-weight:600;}
.hp-bar-wrap{background:var(--dark4);border:1px solid var(--border);border-radius:3px;height:8px;overflow:hidden;margin-bottom:2px;}
.hp-fill{height:100%;background:var(--hp-green);transition:width .4s,background .3s;border-radius:3px;}
.hp-text{font-size:10px;color:var(--text2);text-align:center;}
.gold-row{display:flex;align-items:center;gap:3px;margin-top:5px;font-size:10px;color:var(--gold);}

/* Combo meter */
.combo-row{display:flex;align-items:center;gap:4px;margin-top:4px;}
.combo-label{font-size:9px;color:var(--text3);font-family:'Cinzel',serif;}
.combo-bar-wrap{flex:1;background:var(--dark4);border:1px solid var(--border);border-radius:3px;height:4px;overflow:hidden;}
.combo-fill{height:100%;background:linear-gradient(90deg,var(--combo-color),var(--orange));transition:width .3s;border-radius:3px;}
.combo-count{font-size:10px;color:var(--combo-color);font-family:'Cinzel',serif;min-width:24px;text-align:right;}

.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.stab{flex:1;padding:5px 0;font-size:9px;font-family:'Cinzel',serif;color:var(--text3);cursor:pointer;text-align:center;background:none;border:none;border-bottom:2px solid transparent;transition:all .2s;}
.stab.active{color:var(--pink2);border-bottom-color:var(--pink2);}
.stab:hover{color:var(--text);}
.sidebar-content{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

.inv-item{background:var(--dark3);border:1px solid var(--border);border-radius:5px;padding:5px 7px;margin-bottom:3px;cursor:pointer;transition:all .2s;font-size:10px;}
.inv-item:hover{border-color:var(--pink2);}
.rare-common{color:var(--text3);}
.rare-uncommon{color:var(--green);}
.rare-rare{color:var(--blue2);}
.rare-epic{color:var(--purple2);}
.rare-legendary{color:var(--gold);}
.skill-item{background:var(--dark3);border:1px solid var(--border);border-radius:5px;padding:5px 7px;margin-bottom:3px;cursor:pointer;transition:all .2s;font-size:10px;display:flex;align-items:center;gap:5px;}
.skill-item:hover{border-color:var(--purple2);}
.skill-item.equipped{border-color:var(--pink2);background:rgba(248,96,168,.08);}
.map-item{background:var(--dark3);border:1px solid var(--border);border-radius:5px;padding:5px 7px;margin-bottom:3px;cursor:pointer;transition:all .2s;font-size:10px;}
.map-item:hover:not(.locked){border-color:var(--blue2);}
.map-item.active{border-color:var(--pink2);background:rgba(248,96,168,.08);}
.map-item.locked{opacity:.4;cursor:not-allowed;}

/* ===== GAME CENTER ===== */
.game-center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.scene{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* Story */
.story-box{background:var(--dark2);border:1px solid var(--border2);border-radius:10px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;}
.story-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(176,96,248,.05) 0%,transparent 70%);pointer-events:none;}
.story-title{font-family:'Cinzel',serif;font-size:clamp(13px,2.2vw,19px);color:var(--pink2);text-align:center;margin-bottom:8px;letter-spacing:2px;text-shadow:0 0 20px rgba(248,96,168,.4);}
.story-text{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:10px;}
.story-dialogue{font-style:italic;color:var(--text);font-size:13px;line-height:1.65;padding-left:10px;border-left:2px solid var(--pink);margin-bottom:10px;}
.story-speaker{font-family:'Cinzel',serif;font-size:10px;color:var(--pink2);margin-bottom:3px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.btn{flex:1;min-width:80px;padding:9px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--dark3);color:var(--text);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;transition:all .2s;text-align:center;}
.btn:hover{background:var(--dark4);border-color:var(--text3);}
.btn-gold{border-color:var(--gold);color:var(--gold);}
.btn-gold:hover{background:rgba(212,175,55,.12);}
.btn-pink{border-color:var(--pink);color:var(--pink2);}
.btn-pink:hover{background:rgba(248,96,168,.1);}
.btn-red{border-color:var(--red);color:var(--red2);}
.btn-red:hover{background:rgba(232,72,96,.1);}
.btn-green{border-color:var(--green);color:var(--green2);}
.btn-green:hover{background:rgba(72,216,144,.1);}
.btn-purple{border-color:var(--purple);color:var(--purple2);}
.btn-purple:hover{background:rgba(176,96,248,.1);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ===== BATTLE SCENE ===== */
.battle-scene{background:var(--dark2);border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.battle-bg{height:clamp(155px,23vw,210px);position:relative;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,5vw,55px);
  background:radial-gradient(ellipse at 30% 80%,rgba(176,96,248,.07) 0%,transparent 50%),radial-gradient(ellipse at 70% 20%,rgba(248,96,168,.06) 0%,transparent 40%),var(--dark3);overflow:hidden;}
#slashCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:20;}
.fighter{display:flex;flex-direction:column;align-items:center;position:relative;z-index:10;}
.fighter-emoji{font-size:clamp(44px,8vw,66px);line-height:1;display:block;transition:transform .15s;filter:drop-shadow(0 4px 10px rgba(0,0,0,.6));}
.fighter-name{font-family:'Cinzel',serif;font-size:10px;color:var(--text2);margin-top:3px;}
.boss-tag{font-family:'Cinzel',serif;font-size:9px;color:var(--boss-red);}
.element-badge{font-size:9px;padding:1px 5px;border-radius:10px;font-family:'Cinzel',serif;margin-top:2px;}

/* Fighter anims */
@keyframes attackRight{0%{transform:translateX(0) scale(1)}30%{transform:translateX(55px) scale(1.2)}55%{transform:translateX(-5px) scale(.95)}100%{transform:translateX(0) scale(1)}}
@keyframes attackLeft{0%{transform:translateX(0) scale(1)}30%{transform:translateX(-55px) scale(1.2)}55%{transform:translateX(5px) scale(.95)}100%{transform:translateX(0) scale(1)}}
@keyframes takeDamage{0%{transform:translateX(0);filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}15%{transform:translateX(10px);filter:drop-shadow(0 0 15px rgba(255,50,80,.9)) brightness(2)}30%{transform:translateX(-8px);filter:drop-shadow(0 0 12px rgba(255,50,80,.7)) brightness(1.5)}50%{transform:translateX(5px)}100%{transform:translateX(0);filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}}
@keyframes deathAnim{0%{transform:scale(1) rotate(0);opacity:1}20%{transform:scale(1.2) rotate(-10deg);filter:drop-shadow(0 0 20px rgba(255,50,80,1)) brightness(2)}60%{transform:scale(.7) rotate(45deg) translateY(10px);opacity:.6}100%{transform:scale(.2) rotate(90deg) translateY(30px);opacity:0;filter:grayscale(1)}}
@keyframes victoryBounce{0%,100%{transform:scale(1) translateY(0)}25%{transform:scale(1.15) translateY(-14px)}50%{transform:scale(1) translateY(0)}75%{transform:scale(1.1) translateY(-7px)}}
@keyframes fireShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-6px) scale(1.05)}20%{transform:translateX(6px)}30%{transform:translateX(-5px)}40%{transform:translateX(5px)}50%{transform:translateX(-3px)}60%{transform:translateX(3px)}}
@keyframes iceShiver{0%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}25%{filter:drop-shadow(0 0 18px rgba(64,216,200,.9)) brightness(1.7)}50%{filter:drop-shadow(0 0 24px rgba(64,216,200,1)) brightness(2)}75%{filter:drop-shadow(0 0 15px rgba(64,216,200,.7))}100%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}}
@keyframes darkPulse{0%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}25%{filter:drop-shadow(0 0 20px rgba(176,96,248,.9)) brightness(.5)}50%{filter:drop-shadow(0 0 28px rgba(176,96,248,1)) brightness(.3)}100%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}}
@keyframes lightPulse{0%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}25%{filter:drop-shadow(0 0 22px rgba(248,224,72,1)) brightness(3)}50%{filter:drop-shadow(0 0 30px rgba(255,255,150,1)) brightness(3.5)}100%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}}
@keyframes poisonPulse{0%,100%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}50%{filter:drop-shadow(0 0 18px rgba(64,216,144,.8)) brightness(1.4) saturate(2)}}
@keyframes rageFlash{0%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}20%{filter:drop-shadow(0 0 22px rgba(255,80,0,1)) brightness(2.8)}40%{filter:drop-shadow(0 0 30px rgba(255,200,0,.9)) brightness(3.2)}100%{filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}}
@keyframes critFlash{0%{background:transparent}20%{background:rgba(248,224,72,.2)}50%{background:transparent}70%{background:rgba(248,224,72,.1)}100%{background:transparent}}
@keyframes healGlow{0%{background:transparent}20%{background:rgba(64,216,144,.16)}100%{background:transparent}}
@keyframes bossSkillPulse{0%{background:transparent}10%{background:rgba(255,24,80,.15)}30%{background:rgba(255,24,80,.08)}60%{background:rgba(255,24,80,.12)}100%{background:transparent}}
@keyframes comboFlash{0%{background:transparent}30%{background:rgba(248,208,64,.2)}100%{background:transparent}}
@keyframes windAnim{0%{transform:translateX(0)}20%{transform:translateX(-12px) scaleX(1.1)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}}

.anim-attack-r{animation:attackRight .45s cubic-bezier(.34,1.2,.64,1) forwards;}
.anim-attack-l{animation:attackLeft .45s cubic-bezier(.34,1.2,.64,1) forwards;}
.anim-take-dmg{animation:takeDamage .5s ease forwards;}
.anim-death{animation:deathAnim 1.2s ease forwards;}
.anim-victory{animation:victoryBounce .8s ease;}
.anim-fire{animation:fireShake .5s ease;}
.anim-ice{animation:iceShiver .6s ease;}
.anim-dark{animation:darkPulse .6s ease;}
.anim-light{animation:lightPulse .5s ease;}
.anim-poison{animation:poisonPulse .8s ease;}
.anim-rage{animation:rageFlash .5s ease;}
.anim-wind{animation:windAnim .5s ease;}
.anim-crit-flash{animation:critFlash .6s ease;}
.anim-heal-flash{animation:healGlow .6s ease;}
.anim-boss-skill{animation:bossSkillPulse .8s ease;}
.anim-combo-flash{animation:comboFlash .4s ease;}

/* Battle stats */
.battle-stats{padding:8px 14px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;}
.bstat-label{font-size:9px;color:var(--text3);font-family:'Cinzel',serif;margin-bottom:2px;}
.bstat-bar{background:var(--dark4);border-radius:3px;height:7px;overflow:hidden;border:1px solid var(--border);}
.bstat-fill{height:100%;border-radius:3px;transition:width .4s,background .3s;}
.bstat-text{font-size:10px;color:var(--text2);margin-top:1px;}

/* Boss charge bar */
.boss-skill-bar{padding:4px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text3);}
.boss-charge-bar{flex:1;background:var(--dark4);border:1px solid var(--border);border-radius:3px;height:5px;overflow:hidden;}
.boss-charge-fill{height:100%;background:linear-gradient(90deg,var(--boss-red),var(--orange));transition:width .4s;border-radius:3px;}

/* Elemental weakness indicator */
.weakness-bar{padding:3px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text3);flex-wrap:wrap;}
.el-tag{padding:1px 6px;border-radius:10px;font-family:'Cinzel',serif;font-size:8px;cursor:help;}
.el-weak{background:rgba(248,96,168,.2);border:1px solid var(--pink);color:var(--pink2);}
.el-resist{background:rgba(106,88,136,.2);border:1px solid var(--border);color:var(--text3);}
.el-immune{background:rgba(64,216,144,.1);border:1px solid var(--green);color:var(--green2);}

/* Damage floats */
.dmg-float{position:absolute;font-family:'Cinzel',serif;font-weight:700;font-size:20px;pointer-events:none;animation:floatUp 1.2s ease-out forwards;z-index:100;text-shadow:1px 2px 5px rgba(0,0,0,.9);}
.dmg-normal{color:var(--red2);}
.dmg-critical{color:var(--yellow2);font-size:28px;}
.dmg-heal{color:var(--green2);}
.dmg-miss{color:var(--text3);font-size:14px;}
.dmg-boss{color:var(--boss-red);font-size:26px;}
.dmg-fire{color:#ff8844;font-size:22px;}
.dmg-ice{color:var(--teal2);font-size:22px;}
.dmg-dark{color:var(--purple2);font-size:22px;}
.dmg-light{color:var(--yellow2);font-size:22px;}
.dmg-wind{color:var(--blue2);font-size:22px;}
.dmg-poison{color:var(--green2);font-size:18px;}
.dmg-combo{color:var(--combo-color);font-size:24px;font-style:italic;}
.dmg-weak{color:var(--pink2);font-size:13px;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}30%{opacity:1;transform:translateY(-20px) scale(1.1);}100%{opacity:0;transform:translateY(-65px) scale(.8);}}

/* Battle actions */
.battle-actions{padding:8px;border-top:1px solid var(--border);background:var(--dark2);}
.action-row{display:flex;gap:5px;margin-bottom:5px;}
.action-btn{flex:1;padding:8px 6px;border-radius:7px;border:1px solid var(--border2);background:var(--dark3);color:var(--text);cursor:pointer;transition:all .2s;text-align:center;font-size:11px;font-family:'Crimson Pro',serif;}
.action-btn:hover:not(:disabled){transform:translateY(-1px);}
.action-btn:disabled{opacity:.4;cursor:not-allowed;}
.action-btn .ab-icon{font-size:clamp(14px,3vw,18px);display:block;margin-bottom:2px;}
.action-btn .ab-name{font-family:'Cinzel',serif;font-size:clamp(9px,1.5vw,10px);color:var(--text2);display:block;}
.action-btn .ab-desc{font-size:9px;color:var(--text3);display:block;margin-top:1px;}
.action-btn .ab-cd{font-size:9px;color:var(--red2);display:block;margin-top:1px;}
.action-btn.atk-btn{border-color:var(--pink);}
.action-btn.atk-btn:hover:not(:disabled){background:rgba(248,96,168,.1);}
.action-btn.skill-btn{border-color:var(--purple);}
.action-btn.skill-btn:hover:not(:disabled){background:rgba(176,96,248,.1);}
.action-btn.item-btn{border-color:var(--green);}
.action-btn.item-btn:hover:not(:disabled){background:rgba(64,216,144,.1);}
.action-btn.flee-btn{border-color:var(--text3);}
.action-btn.combo-ready{border-color:var(--combo-color);box-shadow:0 0 8px rgba(248,208,64,.4);animation:comboPulse 1s infinite alternate;}

/* Log */
.log-panel{background:var(--dark2);border:1px solid var(--border);border-radius:7px;padding:7px;height:clamp(80px,14vw,110px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.log-entry{font-size:11px;line-height:1.5;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.log-dmg{color:var(--red2);}
.log-heal{color:var(--green2);}
.log-crit{color:var(--yellow2);}
.log-info{color:var(--blue2);}
.log-warn{color:var(--orange2);}
.log-boss{color:var(--boss-red);font-family:'Cinzel',serif;}
.log-lv{color:var(--pink2);font-family:'Cinzel',serif;}
.log-story{color:var(--purple2);font-style:italic;}
.log-miss{color:var(--text3);}
.log-drop{color:var(--gold);}
.log-combo{color:var(--combo-color);font-family:'Cinzel',serif;}
.log-weak{color:var(--pink);}

/* ===== RIGHT PANEL ===== */
.sidebar-right{width:var(--right-w);background:rgba(17,14,28,.95);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.rpanel-title{font-family:'Cinzel',serif;font-size:10px;color:var(--pink2);padding:7px 9px;border-bottom:1px solid var(--border);letter-spacing:1px;}
.rpanel-content{flex:1;overflow-y:auto;padding:7px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* Job cards */
.job-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.job-card{background:var(--dark3);border:1px solid var(--border);border-radius:7px;padding:7px;cursor:pointer;transition:all .2s;text-align:center;}
.job-card:hover:not(.disabled){border-color:var(--pink2);transform:translateY(-1px);background:rgba(248,96,168,.05);}
.job-card.disabled{opacity:.4;cursor:not-allowed;}
.job-emoji{font-size:22px;display:block;margin-bottom:3px;}
.job-name{font-family:'Cinzel',serif;font-size:10px;color:var(--pink2);margin-bottom:2px;}
.job-desc{font-size:9px;color:var(--text3);}
.job-stats{font-size:9px;color:var(--text2);margin-top:3px;border-top:1px solid var(--border);padding-top:3px;}

/* Shop */
.shop-item{background:var(--dark3);border:1px solid var(--border);border-radius:7px;padding:7px;margin-bottom:5px;font-size:11px;transition:all .2s;}
.shop-item:hover{border-color:var(--pink2);}
.shop-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.shop-item-name{font-size:12px;color:var(--text);}
.shop-item-cost{color:var(--gold);font-family:'Cinzel',serif;font-size:11px;}

/* Overlay */
.notif-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.notif-box{background:var(--dark2);border:2px solid var(--boss-red);border-radius:14px;padding:20px 28px;text-align:center;max-width:320px;width:90%;animation:notifIn .4s cubic-bezier(.34,1.56,.64,1);}
.notif-box.pink-border{border-color:var(--pink);}
@keyframes notifIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.notif-icon{font-size:42px;margin-bottom:10px;}
.notif-title{font-family:'Cinzel',serif;font-size:18px;color:var(--boss-red);margin-bottom:7px;}
.notif-title.pink{color:var(--pink2);}
.notif-text{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px;}
.notif-btn{padding:9px 22px;font-family:'Cinzel',serif;font-size:12px;}
.death-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(180,0,0,0);z-index:500;pointer-events:none;animation:deathScreen 1.5s ease forwards;}
@keyframes deathScreen{0%{background:rgba(180,0,0,0)}40%{background:rgba(120,0,30,.2)}100%{background:rgba(0,0,0,.55)}}

/* Idle */
.idle-actions{display:flex;flex-direction:column;gap:7px;margin-top:10px;}
.idle-btn{width:100%;padding:10px;border-radius:9px;border:1px solid var(--border2);background:var(--dark3);color:var(--text);cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:9px;font-family:'Crimson Pro',serif;font-size:12px;}
.idle-btn:hover{border-color:var(--pink2);}
.idle-btn-icon{font-size:20px;flex-shrink:0;}
.idle-btn-title{font-family:'Cinzel',serif;font-size:11px;color:var(--pink2);display:block;}
.idle-btn-sub{font-size:10px;color:var(--text3);display:block;}

.zone-info-card{background:var(--dark3);border:1px solid var(--border2);border-radius:9px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden;}
.zone-info-card::after{content:attr(data-emoji);position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:40px;opacity:.12;line-height:1;}
.zone-info-name{font-family:'Cinzel',serif;font-size:14px;color:var(--pink2);margin-bottom:3px;}
.zone-info-sub{font-size:11px;color:var(--text2);margin-bottom:6px;font-style:italic;}
.zone-info-enemies{font-size:10px;color:var(--text3);}

/* VS */
.vs-divider{display:flex;flex-direction:column;align-items:center;gap:3px;z-index:10;}
.vs-text{font-family:'Cinzel',serif;font-size:clamp(16px,3.5vw,24px);color:var(--text3);}
.turn-indicator{font-size:9px;color:var(--text3);font-family:'Cinzel',serif;}

.outro-box{background:var(--dark2);border:2px solid var(--pink);border-radius:14px;padding:24px;text-align:center;max-width:400px;margin:0 auto;}
@keyframes slideRight{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.anim-enter-r{animation:slideRight .3s ease-out;}

/* Mobile */
.sidebar-toggle{display:none;background:none;border:none;color:var(--pink2);font-size:16px;cursor:pointer;padding:4px 8px;font-family:'Cinzel',serif;}
@media(max-width:900px){:root{--sidebar-w:175px;--right-w:0px;}.sidebar-right{display:none;}}
@media(max-width:680px){
  :root{--sidebar-w:0px;}
  .sidebar-left{position:fixed;top:0;left:0;height:100%;z-index:200;width:225px;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.7);}
  .sidebar-left.open{transform:translateX(0);}
  .sidebar-toggle{display:flex;align-items:center;gap:4px;}
  .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;}
  .mob-overlay.show{display:block;}
  .action-btn .ab-desc{display:none;}.scene{padding:8px;}.log-panel{height:80px;}
}
@media(max-width:400px){.action-btn .ab-name{display:none;}.battle-bg{height:130px;padding:0 12px;}.fighter-emoji{font-size:40px;}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleMobileSidebar()">☰</button>
    <div>
      <h1>🌸 DRAGON'S QUEST II</h1>
      <span class="header-sub">~ Lyria's Awakening ~</span>
    </div>
  </div>
  <div class="header-right">
    <div class="combo-badge" id="comboBadge">0 COMBO</div>
    <div class="zone-badge" id="zoneBadge">Bab 1: Reruntuhan</div>
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
  </div>
</div>

<div class="mob-overlay" id="mobOverlay" onclick="toggleMobileSidebar()"></div>

<div class="main">
  <!-- Sidebar Left -->
  <div class="sidebar-left" id="sidebarLeft">
    <div class="player-card">
      <div class="player-avatar" id="playerAvatar">👩</div>
      <div class="player-name" id="playerName">Lyria</div>
      <div class="player-job" id="playerJob">Petualang</div>
      <div class="hp-bar-wrap"><div class="hp-fill" id="hpFill" style="width:100%;"></div></div>
      <div class="hp-text" id="hpText">100 / 100</div>
      <div class="level-row" style="margin-top:5px;">
        <div class="level-badge" id="lvBadge">1</div>
        <div class="exp-mini">
          <div class="exp-bar-wrap"><div class="exp-fill" id="expFill" style="width:0%;"></div></div>
          <div class="exp-text" id="expText">0 / 100 EXP</div>
        </div>
      </div>
      <div class="stat-grid" style="margin-top:6px;">
        <div class="stat-box"><div class="stat-box-label">ATK</div><div class="stat-box-value" id="statAtk">10</div></div>
        <div class="stat-box"><div class="stat-box-label">DEF</div><div class="stat-box-value" id="statDef">5</div></div>
      </div>
      <div class="combo-row">
        <span class="combo-label">COMBO</span>
        <div class="combo-bar-wrap"><div class="combo-fill" id="comboFill" style="width:0%;"></div></div>
        <span class="combo-count" id="comboCount">0</span>
      </div>
      <div class="gold-row">🪙 <span id="statGold">0</span> Gold</div>
    </div>
    <div class="sidebar-tabs">
      <button class="stab active" onclick="switchTab('inv')">BAG</button>
      <button class="stab" onclick="switchTab('skill')">SKILL</button>
      <button class="stab" onclick="switchTab('map')">MAP</button>
    </div>
    <div class="sidebar-content" id="sidebarContent"></div>
  </div>

  <!-- Main Scene -->
  <div class="game-center">
    <div class="scene" id="scene"></div>
  </div>

  <!-- Right Panel -->
  <div class="sidebar-right">
    <div class="rpanel-title">📜 LOG PERTEMPURAN</div>
    <div class="rpanel-content" id="rpanel"></div>
  </div>
</div>

<script>
// ============================================================
// MOBILE
// ============================================================
function toggleMobileSidebar(){
  const sl=document.getElementById('sidebarLeft'),ov=document.getElementById('mobOverlay');
  sl.classList.toggle('open');ov.classList.toggle('show');
}

// ============================================================
// ADVANCED AUDIO ENGINE
// ============================================================
let audioCtx=null,soundEnabled=true,bgmGain=null,bgmLoopTimeout=null,bgmNotes=[],bgmIdx=0;

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function toggleSound(){
  soundEnabled=!soundEnabled;
  const btn=document.getElementById('soundBtn');
  btn.textContent=soundEnabled?'🔊':'🔇';
  btn.classList.toggle('muted',!soundEnabled);
  if(bgmGain)bgmGain.gain.setTargetAtTime(soundEnabled?.14:0,getAudio().currentTime,.3);
}

// Rich SFX library — each skill type has unique sound
function sfx(type){
  if(!soundEnabled)return;
  try{
    const ctx=getAudio(),now=ctx.currentTime;
    const g=ctx.createGain();g.connect(ctx.destination);

    const sounds={
      // ATTACKS
      attack:()=>{
        const o=ctx.createOscillator(),n=ctx.createOscillator();
        o.type='sawtooth';n.type='square';
        o.frequency.setValueAtTime(320,now);o.frequency.exponentialRampToValueAtTime(90,now+.2);
        n.frequency.setValueAtTime(180,now+.04);n.frequency.exponentialRampToValueAtTime(50,now+.26);
        g.gain.setValueAtTime(.22,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);
        o.connect(g);n.connect(g);o.start(now);o.stop(now+.3);n.start(now+.04);n.stop(now+.3);
      },
      critical:()=>{
        for(let i=0;i<3;i++){
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='sawtooth';o.frequency.setValueAtTime(440-i*90,now+i*.03);
          o.frequency.exponentialRampToValueAtTime(45,now+.45);
          og.gain.setValueAtTime(.28,now+i*.03);og.gain.exponentialRampToValueAtTime(.001,now+.5);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.03);o.stop(now+.55);
        }
      },
      hurt:()=>{
        const o=ctx.createOscillator();o.type='square';
        o.frequency.setValueAtTime(250,now);o.frequency.exponentialRampToValueAtTime(65,now+.32);
        g.gain.setValueAtTime(.18,now);g.gain.exponentialRampToValueAtTime(.001,now+.38);
        o.connect(g);o.start(now);o.stop(now+.38);
      },
      combo_hit:()=>{
        [600,900,1200].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='triangle';o.frequency.value=f;
          og.gain.setValueAtTime(.15,now+i*.04);og.gain.exponentialRampToValueAtTime(.001,now+i*.04+.28);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.04);o.stop(now+i*.04+.3);
        });
      },
      combo_burst:()=>{
        // Combo finish — epic ascending chord
        [330,415,523,659,830].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type=i%2===0?'sawtooth':'square';o.frequency.value=f;
          og.gain.setValueAtTime(0,now+i*.05);og.gain.linearRampToValueAtTime(.2,now+i*.05+.04);
          og.gain.exponentialRampToValueAtTime(.001,now+i*.05+.5);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.05);o.stop(now+i*.05+.55);
        });
        // Noise burst
        const buf=ctx.createBuffer(1,ctx.sampleRate*.3,ctx.sampleRate);
        const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.06));
        const src=ctx.createBufferSource(),ng=ctx.createGain();
        src.buffer=buf;ng.gain.value=.12;src.connect(ng);ng.connect(ctx.destination);src.start(now+.15);
      },
      // MAGIC SKILLS
      fireball:()=>{
        const o=ctx.createOscillator(),lfo=ctx.createOscillator();
        const lfog=ctx.createGain();
        o.type='sawtooth';o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(40,now+.5);
        lfo.type='sine';lfo.frequency.value=18;lfo.connect(lfog);lfog.gain.value=40;lfog.connect(o.frequency);
        g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.001,now+.55);
        o.connect(g);o.start(now);o.stop(now+.55);lfo.start(now);lfo.stop(now+.55);
      },
      ice:()=>{
        [1200,1600,2000].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='triangle';o.frequency.setValueAtTime(f,now+i*.05);
          o.frequency.exponentialRampToValueAtTime(f*.6,now+i*.05+.35);
          og.gain.setValueAtTime(.12,now+i*.05);og.gain.exponentialRampToValueAtTime(.001,now+i*.05+.4);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.05);o.stop(now+i*.05+.42);
        });
        // Ice crackle noise
        const buf=ctx.createBuffer(1,ctx.sampleRate*.2,ctx.sampleRate);
        const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()>.9?(Math.random()*2-1):0)*Math.exp(-i/(ctx.sampleRate*.05));
        const src=ctx.createBufferSource(),ng=ctx.createGain();
        src.buffer=buf;ng.gain.value=.15;src.connect(ng);ng.connect(ctx.destination);src.start(now);
      },
      lightning:()=>{
        // Crackling electricity
        for(let i=0;i<5;i++){
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='sawtooth';o.frequency.value=800+Math.random()*400;
          og.gain.setValueAtTime(.18,now+i*.04);og.gain.exponentialRampToValueAtTime(.001,now+i*.04+.15);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.04);o.stop(now+i*.04+.18);
        }
      },
      dark_magic:()=>{
        const o=ctx.createOscillator();o.type='sawtooth';
        o.frequency.setValueAtTime(80,now);o.frequency.exponentialRampToValueAtTime(30,now+.6);
        const dist=ctx.createWaveShaper();
        const curve=new Float32Array(256);for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x?x/Math.abs(x)*(1-Math.exp(-Math.abs(x)*3)):0;}
        dist.curve=curve;
        g.gain.setValueAtTime(.22,now);g.gain.exponentialRampToValueAtTime(.001,now+.65);
        o.connect(dist);dist.connect(g);o.start(now);o.stop(now+.65);
      },
      wind:()=>{
        // Whoosh noise
        const buf=ctx.createBuffer(1,ctx.sampleRate*.4,ctx.sampleRate);
        const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
        const src=ctx.createBufferSource();src.buffer=buf;
        const filter=ctx.createBiquadFilter();filter.type='bandpass';
        filter.frequency.setValueAtTime(600,now);filter.frequency.exponentialRampToValueAtTime(1800,now+.2);
        filter.frequency.exponentialRampToValueAtTime(400,now+.4);
        filter.Q.value=3;
        g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.25,now+.1);g.gain.exponentialRampToValueAtTime(.001,now+.42);
        src.connect(filter);filter.connect(g);src.start(now);
      },
      holy:()=>{
        [523,659,784,1047,1319].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='sine';o.frequency.value=f;
          og.gain.setValueAtTime(0,now+i*.05);og.gain.linearRampToValueAtTime(.12,now+i*.05+.04);
          og.gain.exponentialRampToValueAtTime(.001,now+i*.05+.5);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.05);o.stop(now+i*.05+.54);
        });
      },
      poison_strike:()=>{
        [180,220,260].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='square';o.frequency.setValueAtTime(f,now+i*.04);
          og.gain.setValueAtTime(.12,now+i*.04);og.gain.exponentialRampToValueAtTime(.001,now+i*.04+.3);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.04);o.stop(now+i*.04+.32);
        });
      },
      heal:()=>{
        [523,659,784,1047].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='sine';o.frequency.value=f;
          og.gain.setValueAtTime(0,now+i*.07);og.gain.linearRampToValueAtTime(.12,now+i*.07+.04);
          og.gain.exponentialRampToValueAtTime(.001,now+i*.07+.4);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.07);o.stop(now+i*.07+.43);
        });
      },
      shield:()=>{
        const o=ctx.createOscillator();o.type='triangle';
        o.frequency.setValueAtTime(400,now);o.frequency.linearRampToValueAtTime(600,now+.2);
        g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);
        o.connect(g);o.start(now);o.stop(now+.3);
      },
      buff:()=>{
        [300,400,500].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='triangle';o.frequency.value=f;
          og.gain.setValueAtTime(.1,now+i*.06);og.gain.exponentialRampToValueAtTime(.001,now+i*.06+.35);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.06);o.stop(now+i*.06+.38);
        });
      },
      // BOSS
      boss_appear:()=>{
        [55,65,80,95].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='sawtooth';o.frequency.value=f;
          og.gain.setValueAtTime(.3,now+i*.06);og.gain.exponentialRampToValueAtTime(.001,now+i*.06+.7);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.06);o.stop(now+i*.06+.75);
        });
        // Deep rumble
        const buf=ctx.createBuffer(1,ctx.sampleRate*.5,ctx.sampleRate);
        const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.2));
        const src=ctx.createBufferSource(),ng=ctx.createGain();
        src.buffer=buf;ng.gain.value=.2;src.connect(ng);ng.connect(ctx.destination);src.start(now);
      },
      boss_skill:()=>{
        [40,50,62].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='sawtooth';o.frequency.value=f;
          og.gain.setValueAtTime(.3,now+i*.05);og.gain.exponentialRampToValueAtTime(.001,now+i*.05+.8);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.05);o.stop(now+i*.05+.85);
        });
      },
      boss_fire:()=>{
        const o=ctx.createOscillator(),lfo=ctx.createOscillator(),lfog=ctx.createGain();
        o.type='sawtooth';o.frequency.setValueAtTime(150,now);o.frequency.exponentialRampToValueAtTime(30,now+.7);
        lfo.type='sine';lfo.frequency.value=22;lfo.connect(lfog);lfog.gain.value=60;lfog.connect(o.frequency);
        g.gain.setValueAtTime(.35,now);g.gain.exponentialRampToValueAtTime(.001,now+.75);
        o.connect(g);o.start(now);o.stop(now+.75);lfo.start(now);lfo.stop(now+.75);
      },
      boss_ice:()=>{
        // Deep ice slam
        const o=ctx.createOscillator();o.type='triangle';
        o.frequency.setValueAtTime(60,now);o.frequency.exponentialRampToValueAtTime(20,now+.5);
        g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.001,now+.55);
        o.connect(g);o.start(now);o.stop(now+.55);
        // + crackle
        const buf=ctx.createBuffer(1,ctx.sampleRate*.3,ctx.sampleRate);
        const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()>.85?(Math.random()*2-1):0)*Math.exp(-i/(ctx.sampleRate*.08));
        const src=ctx.createBufferSource(),ng=ctx.createGain();
        src.buffer=buf;ng.gain.value=.18;src.connect(ng);ng.connect(ctx.destination);src.start(now);
      },
      boss_dark:()=>{
        const o=ctx.createOscillator();o.type='sawtooth';
        o.frequency.setValueAtTime(60,now);o.frequency.exponentialRampToValueAtTime(20,now+.7);
        const dist=ctx.createWaveShaper();
        const curve=new Float32Array(256);for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x?x/Math.abs(x)*(1-Math.exp(-Math.abs(x)*4)):0;}
        dist.curve=curve;
        g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.001,now+.75);
        o.connect(dist);dist.connect(g);o.start(now);o.stop(now+.75);
      },
      levelup:()=>{
        [523,659,784,1047,1319,1568].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='triangle';o.frequency.value=f;
          og.gain.setValueAtTime(0,now+i*.08);og.gain.linearRampToValueAtTime(.18,now+i*.08+.05);
          og.gain.exponentialRampToValueAtTime(.001,now+i*.08+.5);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.08);o.stop(now+i*.08+.55);
        });
      },
      gold:()=>{
        [880,1100,1320].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='sine';o.frequency.value=f;
          og.gain.setValueAtTime(.1,now+i*.06);og.gain.exponentialRampToValueAtTime(.001,now+i*.06+.28);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.06);o.stop(now+i*.06+.3);
        });
      },
      flee:()=>{
        const o=ctx.createOscillator();o.type='sine';
        o.frequency.setValueAtTime(700,now);o.frequency.exponentialRampToValueAtTime(220,now+.3);
        g.gain.setValueAtTime(.12,now);g.gain.exponentialRampToValueAtTime(.001,now+.35);
        o.connect(g);o.start(now);o.stop(now+.35);
      },
      miss:()=>{
        const o=ctx.createOscillator();o.type='sine';
        o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(110,now+.18);
        g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);
        o.connect(g);o.start(now);o.stop(now+.2);
      },
      death_enemy:()=>{
        const o=ctx.createOscillator();o.type='sawtooth';
        o.frequency.setValueAtTime(280,now);o.frequency.exponentialRampToValueAtTime(22,now+.9);
        g.gain.setValueAtTime(.28,now);g.gain.exponentialRampToValueAtTime(.001,now+.95);
        o.connect(g);o.start(now);o.stop(now+.95);
      },
      death_player:()=>{
        [380,280,180,90,45].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type=i%2===0?'sawtooth':'square';o.frequency.value=f;
          og.gain.setValueAtTime(.22,now+i*.22);og.gain.exponentialRampToValueAtTime(.001,now+i*.22+.28);
          o.connect(og);og.connect(ctx.destination);o.start(now+i*.22);o.stop(now+i*.22+.32);
        });
      },
    };

    if(sounds[type]) sounds[type](); else if(sounds['attack']) sounds['attack']();
  }catch(e){}
}

function startBGM(mood){
  stopBGM();if(!soundEnabled)return;
  try{
    const ctx=getAudio();
    const patterns={
      explore:[{f:220,d:.6,t:'triangle'},{f:246,d:.3,t:'triangle'},{f:196,d:.5,t:'triangle'},{f:185,d:.35,t:'triangle'},
               {f:220,d:.7,t:'triangle'},{f:165,d:.5,t:'triangle'},{f:196,d:.4,t:'triangle'},{f:174,d:.5,t:'triangle'},{f:165,d:.8,t:'triangle'}],
      battle:[{f:110,d:.2,t:'square'},{f:110,d:.2,t:'square'},{f:130,d:.3,t:'square'},{f:110,d:.2,t:'square'},
              {f:98,d:.2,t:'square'},{f:110,d:.3,t:'square'},{f:130,d:.2,t:'square'},{f:147,d:.4,t:'square'}],
      boss:[{f:55,d:.35,t:'sawtooth'},{f:55,d:.3,t:'sawtooth'},{f:65,d:.45,t:'sawtooth'},{f:55,d:.3,t:'sawtooth'},
            {f:49,d:.55,t:'sawtooth'},{f:55,d:.3,t:'sawtooth'},{f:58,d:.4,t:'sawtooth'},{f:65,d:.65,t:'sawtooth'}],
    };
    bgmNotes=patterns[mood]||patterns.explore;bgmIdx=0;
    bgmGain=ctx.createGain();bgmGain.gain.value=soundEnabled?.13:0;
    const delay=ctx.createDelay(.4);delay.delayTime.value=.38;
    const dg=ctx.createGain();dg.gain.value=.2;
    bgmGain.connect(ctx.destination);bgmGain.connect(delay);delay.connect(dg);dg.connect(ctx.destination);
    function playNote(){
      if(!soundEnabled&&bgmGain){bgmGain.gain.setTargetAtTime(0,ctx.currentTime,.2);return;}
      const note=bgmNotes[bgmIdx%bgmNotes.length];bgmIdx++;
      const now=ctx.currentTime;
      const osc=ctx.createOscillator(),og=ctx.createGain();
      osc.type=note.t||'triangle';osc.frequency.value=note.f;
      og.gain.setValueAtTime(0,now);og.gain.linearRampToValueAtTime(1,now+.03);og.gain.exponentialRampToValueAtTime(.001,now+note.d*.85);
      osc.connect(og);og.connect(bgmGain);osc.start(now);osc.stop(now+note.d);
      bgmLoopTimeout=setTimeout(playNote,note.d*1000);
    }
    playNote();
  }catch(e){}
}
function stopBGM(){
  if(bgmLoopTimeout)clearTimeout(bgmLoopTimeout);bgmLoopTimeout=null;
  if(bgmGain){try{bgmGain.gain.setTargetAtTime(0,getAudio().currentTime,.3);}catch(e){}bgmGain=null;}
}

function calcStats(){
  const p=G.player;
  p.atk=p.baseAtk;p.def=p.baseDef;p.maxHp=p.baseMaxHp;
  if(p.job){const j=JOBS[p.job];p.atk+=j.bonus.atk;p.def+=j.bonus.def;p.maxHp+=j.bonus.hp;}
  if(p.jobUpgrade){const u=JOB_UPGRADES[p.job].find(x=>x.name===p.jobUpgrade);if(u){p.atk+=u.bonus.atk;p.def+=u.bonus.def;p.maxHp+=u.bonus.hp;}}
  if(p.job2){const j2=JOBS[p.job2];p.atk+=Math.floor(j2.bonus.atk*.45);p.def+=Math.floor(j2.bonus.def*.45);p.maxHp+=Math.floor(j2.bonus.hp*.45);}
  if(p.job2Upgrade){const u=JOB_UPGRADES[p.job2].find(x=>x.name===p.job2Upgrade);if(u){p.atk+=Math.floor(u.bonus.atk*.45);p.def+=Math.floor(u.bonus.def*.45);p.maxHp+=Math.floor(u.bonus.hp*.45);}}
  p.inventory.forEach(it=>{if(it.equipped&&it.type==='weapon')p.atk+=it.effect;if(it.equipped&&it.type==='armor')p.def+=it.effect;});
  p.hp=Math.min(p.hp,p.maxHp);
}

function getAvailableSkills(){
  const p=G.player,skills=[];
  if(p.job)skills.push(...JOBS[p.job].skills);
  if(p.job2)skills.push(...JOBS[p.job2].skills.slice(0,2));
  return skills;
}

function addCombo(n=1){
  G.combo=Math.min(G.combo+n,G.comboMax);
  if(G.comboDecay)clearTimeout(G.comboDecay);
  G.comboDecay=setTimeout(()=>{G.combo=0;updateComboUI();},8000);
  updateComboUI();
  // Show badge
  const badge=document.getElementById('comboBadge');
  if(badge){badge.style.display='flex';badge.textContent=G.combo+' COMBO';badge.classList.remove('comboPulse');void badge.offsetWidth;badge.classList.add('comboPulse');}
}
function resetCombo(){
  G.combo=0;if(G.comboDecay)clearTimeout(G.comboDecay);
  const badge=document.getElementById('comboBadge');if(badge)badge.style.display='none';
  updateComboUI();
}
function updateComboUI(){
  const fill=document.getElementById('comboFill'),count=document.getElementById('comboCount');
  if(fill)fill.style.width=(G.combo/G.comboMax*100)+'%';
  if(count)count.textContent=G.combo;
}
function getComboMult(){return 1+G.combo*.05;}// +5% dmg per combo

// Element weakness calculation
function getElementMult(element,enemyName){
  const eData=ENEMY_ELEMENTS[enemyName];
  if(!eData)return{mult:1,label:''};
  if(eData.immune.includes(element))return{mult:0,label:'IMMUNE'};
  if(eData.weak.includes(element))return{mult:1.8,label:'WEAK!'};
  if(eData.resist.includes(element))return{mult:0.5,label:'Resist'};
  return{mult:1,label:''};
}

function updateStatsUI(){
  const p=G.player;calcStats();
  const jobEmoji=p.job?JOBS[p.job].emoji:'👩';
  document.getElementById('playerAvatar').textContent=jobEmoji;
  document.getElementById('playerName').textContent=p.name;
  let jobTxt="Petualang";
  if(p.job){jobTxt=JOBS[p.job].name;if(p.jobUpgrade)jobTxt=p.jobUpgrade;if(p.job2)jobTxt+=" / "+(p.job2Upgrade||JOBS[p.job2].name);}
  document.getElementById('playerJob').textContent=jobTxt;
  document.getElementById('lvBadge').textContent=p.level;
  const buffAtk=G.statusEffects.buffAtk||0;
  document.getElementById('statAtk').textContent=Math.ceil(p.atk+buffAtk);
  document.getElementById('statDef').textContent=Math.ceil(p.def+(G.statusEffects.buffDef||0));
  document.getElementById('statGold').textContent=p.gold;
  const hpPct=Math.max(0,p.hp/p.maxHp*100);
  const hpEl=document.getElementById('hpFill');
  hpEl.style.width=hpPct+'%';
  hpEl.style.background=hpPct>60?'var(--hp-green)':hpPct>30?'var(--hp-yellow)':'var(--hp-red)';

  const zone=ZONES[p.currentZone];
  document.getElementById('zoneBadge').textContent='Bab '+zone.id+': '+zone.name;
  updateComboUI();
}

function renderSidebar(){
  const el=document.getElementById('sidebarContent'),p=G.player;
  if(G.currentTab==='inv'){
    if(!p.inventory.length){el.innerHTML='<div style="color:var(--text3);font-size:10px;text-align:center;padding:20px 0;">Tas kosong</div>';return;}
    el.innerHTML=p.inventory.map((it,i)=>`
      <div class="inv-item" onclick="useItem(${i})">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="inv-item-name">${it.emoji||''} ${it.name}</span>
          ${it.equipped?'<span style="font-size:9px;color:var(--pink2);">✓</span>':''}
        </div>
        <div class="rare-${it.rarity}" style="font-size:9px;">${it.rarity}${it.type==='potion'?' · +'+it.effect+' HP':it.type==='weapon'?' · ATK+'+it.effect:' · DEF+'+it.effect}</div>
      </div>`).join('');
  }else if(G.currentTab==='skill'){
    const skills=getAvailableSkills();
    if(!p.job){el.innerHTML='<div style="color:var(--text3);font-size:10px;text-align:center;padding:20px 0;">Pilih job di level 7</div>';return;}
    el.innerHTML='<div style="font-size:9px;color:var(--text3);margin-bottom:6px;">Tap equip ke slot (max 3)</div>'+
      skills.map(sk=>{const sd=SKILL_DATA[sk]||{};const slot=p.equippedSkills.indexOf(sk);
        const elemColor={fire:'var(--orange)',ice:'var(--teal2)',wind:'var(--blue2)',dark:'var(--purple2)',light:'var(--yellow2)',poison:'var(--green2)',physical:'var(--text2)'}[sd.element]||'var(--text2)';
        return`<div class="skill-item ${slot>=0?'equipped':''}" onclick="toggleSkill('${sk}')">
          <span style="font-size:9px;color:var(--text3);min-width:14px;">${slot>=0?'S'+(slot+1):''}</span>
          <div style="flex:1"><div style="color:var(--text);">${sd.emoji||''} ${sk}</div>
          <div style="font-size:9px;color:var(--text2);">${sd.desc||''}</div></div>
          <span style="font-size:9px;color:${elemColor};">${sd.element||''}</span></div>`;
      }).join('');
  }else{
    const zone=ZONES[p.currentZone];
    el.innerHTML=zone.maps.map((m,i)=>{const unlocked=p.unlockedMaps.includes(m.id);const active=p.currentMap===i;
      return`<div class="map-item ${!unlocked?'locked':''} ${active?'active':''}" onclick="travelMap(${i})">
        <div>${m.emoji} ${m.name}</div>
        <div style="font-size:9px;color:var(--text3);">${unlocked?'Lvl '+m.minLevel+'+ ':'🔒 Lvl '+m.minLevel}</div></div>`;
    }).join('');
  }
}

function log(msg,type='info'){G.battleLog.unshift({msg,type});if(G.battleLog.length>60)G.battleLog.pop();renderRpanel();}
function toggleSkill(sk){
  if(G.phase==='battle'){log('Tidak bisa ganti skill saat battle!','warn');return;}
  const eq=G.player.equippedSkills,idx=eq.indexOf(sk);
  if(idx>=0){eq[idx]=null;log(`Skill ${sk} dilepas`,'info');}
  else{const empty=eq.indexOf(null);if(empty<0){log('Slot penuh!','warn');return;}eq[empty]=sk;log(`Skill ${sk} → Slot ${empty+1}`,'info');}
  renderSidebar();
}

function useItem(idx){
  const it=G.player.inventory[idx];if(!it)return;
  if(it.type==='potion'){
    if(G.phase!=='battle'&&G.phase!=='idle')return;
    const healed=Math.min(it.effect,G.player.maxHp-G.player.hp);
    G.player.hp=Math.min(G.player.maxHp,G.player.hp+it.effect);
    G.player.inventory.splice(idx,1);
    sfx('heal');log(`Menggunakan ${it.name}! +${healed} HP`,'heal');
    updateStatsUI();renderScene();
    if(G.phase==='battle')setTimeout(enemyTurn,600);
  }else if(it.type==='weapon'||it.type==='armor'){
    if(it.equipped){it.equipped=false;log(`Melepas ${it.name}`,'info');}
    else{G.player.inventory.forEach(x=>{if(x.type===it.type)x.equipped=false;});it.equipped=true;log(`Memakai ${it.name}`,'info');}
    calcStats();updateStatsUI();renderSidebar();
    if(G.phase==='battle')renderScene();
  }
}

function travelMap(mapIdx){
  const p=G.player,zone=ZONES[p.currentZone],m=zone.maps[mapIdx];
  if(!p.unlockedMaps.includes(m.id)){log('Peta ini belum terbuka!','warn');return;}
  if(G.phase==='battle'){log('Tidak bisa pindah saat pertarungan!','warn');return;}
  p.currentMap=mapIdx;log(`Menuju ${m.name}...`,'info');
  G.phase='idle';startBGM('explore');renderScene();
}

      <div class="story-text">Kota Goldmere, kota terkaya di dunia, runtuh dalam satu malam. Di tengah reruntuhan itu, seorang gadis muda — <strong style="color:var(--pink2)">Lyria</strong> — terbangun tanpa ingatan, hanya dengan sebuah nama yang terukir di pedangnya.</div>
      <div class="story-dialogue">
        <div class="story-speaker">Suara Misterius:</div>
        "Lyria... kakakmu menunggumu di ujung kegelapan. Tapi untuk menemukannya, kamu harus melintasi tiga alam — reruntuhan, kristal, dan api abadi. Kekuatan apa yang kamu percayai, gadis kecil?"
      </div>
      <div class="story-text" style="color:var(--orange2);font-family:'Cinzel',serif;font-size:11px;">⚠ Musuh sangat tangguh. Eksploitasi kelemahan elemen, bangun combo, dan gunakan skill dengan bijak!</div>
      <div class="story-text" style="color:var(--pink2);font-size:11px;">✨ Sistem BARU: Combo Meter · Elemental Weakness · Skill Sound Unik</div>

}

function refreshShop(){const shuffled=[...ALL_ITEMS].sort(()=>Math.random()-.5);G.shopItems=shuffled.slice(0,6);}

function renderShop(){
  document.getElementById('scene').innerHTML=`
    <div class="story-box anim-enter-r">
      <div class="story-title" style="font-size:15px;">🏪 TOKO PETUALANG</div>

          <div class="shop-item-top">

function buyItem(idx){
  const it=G.shopItems[idx];if(!it)return;
  if(G.player.gold<it.cost){log("Gold tidak cukup!",'warn');renderScene();return;}
  G.player.gold-=it.cost;G.player.inventory.push({...it});
  sfx('gold');log(`Membeli ${it.name}!`,'drop');
  G.shopItems.splice(idx,1);calcStats();updateStatsUI();renderSidebar();renderScene();
}

function closeShop(){G.phase='idle';renderScene();}

function renderIdle(){
  const p=G.player,zone=ZONES[p.currentZone],map=zone.maps[p.currentMap];
  const diff=map.minLevel-p.level;
  let diffLabel="NORMAL",diffColor="var(--yellow2)";
  if(diff>5){diffLabel="BAHAYA EKSTREM";diffColor="var(--boss-red)";}
  else if(diff>2){diffLabel="SANGAT SULIT";diffColor="var(--red2)";}
  else if(diff>0){diffLabel="SULIT";diffColor="var(--orange2)";}
  else if(diff>=-3){diffLabel="NORMAL";diffColor="var(--yellow2)";}
  else if(diff>=-6){diffLabel="MUDAH";diffColor="var(--green2)";}
  else{diffLabel="TERLALU MUDAH";diffColor="var(--text3)";}

  document.getElementById('scene').innerHTML=`
    <div class="zone-info-card anim-enter-r" data-emoji="${map.emoji}">
      <div class="zone-info-name">${map.emoji} ${map.name}</div>
      <div class="zone-info-sub">${map.story}</div>
      <div class="zone-info-enemies">Musuh: ${map.enemies.join(' · ')}</div>
      <div style="margin-top:7px;font-size:10px;color:${diffColor};font-family:'Cinzel',serif;">${diffLabel}</div>
    </div>
    <div class="idle-actions">
      <button class="idle-btn" onclick="startBattle()">
        <span class="idle-btn-icon">⚔️</span>
        <div><span class="idle-btn-title">MULAI PERTARUNGAN</span>
        <span class="idle-btn-sub">${G.miniBossReady?'⚠️ BOSS AREA MENANTI!':'Hadapi monster (gunakan kelemahan elemen!)'}</span></div>
      </button>
      <button class="idle-btn" onclick="restHeal()">
        <span class="idle-btn-icon">🌸</span>
        <div><span class="idle-btn-title">ISTIRAHAT</span>
        <span class="idle-btn-sub">Pulihkan HP (gratis jika HP > 65%)</span></div>
      </button>
      <button class="idle-btn" onclick="openShop()">
        <span class="idle-btn-icon">🏪</span>
        <div><span class="idle-btn-title">TOKO SENJATA</span>
        <span class="idle-btn-sub">Stok baru tiap aksi · ${G.player.gold} Gold</span></div>
      </button>
    </div>
    <div class="log-panel" style="margin-top:10px;">
      ${G.battleLog.slice(0,10).map(l=>`<div class="log-entry log-${l.type}">${l.msg}</div>`).join('')}
    </div>`;
}

function restHeal(){
  const p=G.player,missing=p.maxHp-p.hp;
  if(missing===0){log("HP sudah penuh!",'info');return;}
  const cost=p.hp/p.maxHp<0.65?Math.floor(missing*.1):0;
  if(cost>0&&p.gold<cost){log(`Butuh ${cost} gold untuk istirahat!`,'warn');return;}
  if(cost>0)p.gold-=cost;
  p.hp=p.maxHp;sfx('heal');refreshShop();
  log(`🌸 Beristirahat... HP penuh!${cost?' (-'+cost+' gold)':''}`,'heal');
  updateStatsUI();renderScene();
}

function openShop(){G.phase='shop';renderScene();}
